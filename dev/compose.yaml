# Dev/Utility Stack - Vibe Kanban, Vibe Kanban Tools
# Usage: ./nova.sh up dev   (or: docker compose -f dev/compose.yaml up -d)

name: dev

networks:
  traefik_default:
    external: true
    name: "traefik_default"
  socket_proxy:
    external: true
    name: "socket_proxy"

services:

  vibe-kanban:
    build: "../vibe-kanban"
    cap_drop:
      - "AUDIT_CONTROL"
      - "BLOCK_SUSPEND"
      - "DAC_READ_SEARCH"
      - "IPC_LOCK"
      - "IPC_OWNER"
      - "LEASE"
      - "LINUX_IMMUTABLE"
      - "MAC_ADMIN"
      - "MAC_OVERRIDE"
      - "NET_ADMIN"
      - "NET_BROADCAST"
      - "SYSLOG"
      - "SYS_ADMIN"
      - "SYS_BOOT"
      - "SYS_MODULE"
      - "SYS_NICE"
      - "SYS_PACCT"
      - "SYS_PTRACE"
      - "SYS_RAWIO"
      - "SYS_RESOURCE"
      - "SYS_TIME"
      - "SYS_TTY_CONFIG"
      - "WAKE_ALARM"
    container_name: "vibe-kanban"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - "GH_TOKEN=${GH_TOKEN}"
      - "PORT=4000"
      - "TZ=${TZ}"
      - "IS_SANDBOX=1"
      - "DOCKER_HOST=tcp://socket-proxy:2375"
    hostname: "${NOVA_HOSTNAME}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.vibe-kanban.rule: "Host(`kanban.${NOVA_DOMAIN}`)"
      traefik.http.routers.vibe-kanban.entrypoints: "websecure"
      traefik.http.routers.vibe-kanban.tls: "true"
      traefik.http.routers.vibe-kanban.middlewares: "authelia@file"
      traefik.http.services.vibe-kanban.loadbalancer.server.port: "4000"
      homepage.group: "Development"
      homepage.name: "Vibe Kanban"
      homepage.icon: "https://www.google.com/s2/favicons?domain=vibekanban.com/&sz=128"
      homepage.href: "http://kanban.${NOVA_DOMAIN}"
      homepage.description: "Project Management"
      wud.watch: "false"
    networks:
      - "traefik_default"
      - "socket_proxy"
    ports:
      - "4000:4000/tcp"
    restart: "unless-stopped"
    volumes:
      - "vibe-kanban-repos:/repos"
      - "vibe-kanban-cache:/root/.npm/_npx"
      - "vibe-kanban-claude:/root/.claude"
      - "vibe-kanban-data:/root/.local/share/vibe-kanban"
      - "/home/koonan/.ssh:/root/.ssh:ro"
      - "/home/koonan/.gitconfig:/root/.gitconfig:ro"
      # All named volumes (read-only) — for log/config inspection and debugging
      - "authelia_data:/mnt/volumes/authelia_data:ro"
      - "authelia_redis:/mnt/volumes/authelia_redis:ro"
      - "backrest_backrest_cache:/mnt/volumes/backrest_backrest_cache:ro"
      - "backrest_backrest_config:/mnt/volumes/backrest_backrest_config:ro"
      - "backrest_backrest_data:/mnt/volumes/backrest_backrest_data:ro"
      - "bazarr_config:/mnt/volumes/bazarr_config:ro"
      - "gluetun_data:/mnt/volumes/gluetun_data:ro"
      - "ha_config:/mnt/volumes/ha_config:ro"
      - "homescreen_hero_data:/mnt/volumes/homescreen_hero_data:ro"
      - "immich_immich-ml-model-cache:/mnt/volumes/immich_immich-ml-model-cache:ro"
      - "immich_power_tools_data:/mnt/volumes/immich_power_tools_data:ro"
      - "infra_arcane_data:/mnt/volumes/infra_arcane_data:ro"
      - "infra_dockge_data:/mnt/volumes/infra_dockge_data:ro"
      - "kandev_kandev-data:/mnt/volumes/kandev_kandev-data:ro"
      - "matter_server_data:/mnt/volumes/matter_server_data:ro"
      - "media_kometa_trigger:/mnt/volumes/media_kometa_trigger:ro"
      - "minecraft_data:/mnt/volumes/minecraft_data:ro"
      - "movienight_db:/mnt/volumes/movienight_db:ro"
      - "movienight_test_db:/mnt/volumes/movienight_test_db:ro"
      - "ntfy_data:/mnt/volumes/ntfy_data:ro"
      - "overseerr_config:/mnt/volumes/overseerr_config:ro"
      - "plex_data_1:/mnt/volumes/plex_data_1:ro"
      - "prowlarr_config:/mnt/volumes/prowlarr_config:ro"
      - "qbittorrent_config:/mnt/volumes/qbittorrent_config:ro"
      - "qbittorrent_data:/mnt/volumes/qbittorrent_data:ro"
      - "radarr_config:/mnt/volumes/radarr_config:ro"
      - "samba_config:/mnt/volumes/samba_config:ro"
      - "scrutiny_data:/mnt/volumes/scrutiny_data:ro"
      - "seerr_config:/mnt/volumes/seerr_config:ro"
      - "snapotter_data:/mnt/volumes/snapotter_data:ro"
      - "sonarr_config:/mnt/volumes/sonarr_config:ro"
      - "stirling_config:/mnt/volumes/stirling_config:ro"
      - "strava_hevy_data:/mnt/volumes/strava_hevy_data:ro"
      - "tautulli_config:/mnt/volumes/tautulli_config:ro"
      - "tdarr_configs:/mnt/volumes/tdarr_configs:ro"
      - "tdarr_logs:/mnt/volumes/tdarr_logs:ro"
      - "tdarr_server:/mnt/volumes/tdarr_server:ro"
      - "tools_actual_data:/mnt/volumes/tools_actual_data:ro"
      - "tools_snapotter_workspace:/mnt/volumes/tools_snapotter_workspace:ro"
      - "traefik_acme:/mnt/volumes/traefik_acme:ro"
      - "uptime_kuma_data:/mnt/volumes/uptime_kuma_data:ro"
      - "vikunja_db:/mnt/volumes/vikunja_db:ro"
      - "vikunja_files:/mnt/volumes/vikunja_files:ro"
      - "zwave-js-ui:/mnt/volumes/zwave-js-ui:ro"

  vibe-kanban-tools:
    image: "ghcr.io/kjsb25/vibe-kanban-tools:latest"
    container_name: "vibe-kanban-tools"
    environment:
      - "VIBE_KANBAN_URL=http://vibe-kanban:4000"
      - "VIBE_KANBAN_API_KEY=${VIBE_KANBAN_API_KEY:-}"
      - "SUBMIT_TOKEN=${VIBE_KANBAN_TOOLS_SUBMIT_TOKEN:-}"
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.vibe-kanban-tools.rule: "Host(`kanban-tools.${NOVA_DOMAIN}`)"
      traefik.http.routers.vibe-kanban-tools.entrypoints: "websecure"
      traefik.http.routers.vibe-kanban-tools.tls: "true"
      traefik.http.routers.vibe-kanban-tools.middlewares: "authelia@file"
      traefik.http.services.vibe-kanban-tools.loadbalancer.server.port: "3000"
      homepage.group: "Development"
      homepage.name: "Vibe Kanban Tools"
      homepage.icon: "https://www.google.com/s2/favicons?domain=vibekanban.com/&sz=128"
      homepage.href: "http://kanban-tools.${NOVA_DOMAIN}"
      homepage.description: "Quick-capture tasks for Vibe Kanban"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3001:3000/tcp"
    restart: "unless-stopped"

