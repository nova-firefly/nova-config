# Dev/Utility Stack - Vibe Kanban, Vibe Kanban Tools, Mission Control
# Usage: ./nova.sh up dev   (or: docker compose -f dev/compose.yaml up -d)

name: dev

networks:
  traefik_default:
    external: true
    name: "traefik_default"
  socket_proxy:
    external: true
    name: "socket_proxy"

services:

  vibe-kanban:
    build: "../vibe-kanban"
    cap_drop:
      - "AUDIT_CONTROL"
      - "BLOCK_SUSPEND"
      - "DAC_READ_SEARCH"
      - "IPC_LOCK"
      - "IPC_OWNER"
      - "LEASE"
      - "LINUX_IMMUTABLE"
      - "MAC_ADMIN"
      - "MAC_OVERRIDE"
      - "NET_ADMIN"
      - "NET_BROADCAST"
      - "SYSLOG"
      - "SYS_ADMIN"
      - "SYS_BOOT"
      - "SYS_MODULE"
      - "SYS_NICE"
      - "SYS_PACCT"
      - "SYS_PTRACE"
      - "SYS_RAWIO"
      - "SYS_RESOURCE"
      - "SYS_TIME"
      - "SYS_TTY_CONFIG"
      - "WAKE_ALARM"
    container_name: "vibe-kanban"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - "GH_TOKEN=${GH_TOKEN}"
      - "PORT=4000"
      - "TZ=${TZ}"
      - "IS_SANDBOX=1"
      - "DOCKER_HOST=tcp://socket-proxy:2375"
    hostname: "${NOVA_HOSTNAME}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.vibe-kanban.rule: "Host(`kanban.${NOVA_DOMAIN}`)"
      traefik.http.routers.vibe-kanban.entrypoints: "websecure"
      traefik.http.routers.vibe-kanban.tls: "true"
      traefik.http.routers.vibe-kanban.middlewares: "authelia@file"
      traefik.http.services.vibe-kanban.loadbalancer.server.port: "4000"
      homepage.group: "Development"
      homepage.name: "Vibe Kanban"
      homepage.icon: "https://www.google.com/s2/favicons?domain=vibekanban.com/&sz=128"
      homepage.href: "http://kanban.${NOVA_DOMAIN}"
      homepage.description: "Project Management"
      wud.watch: "false"
    networks:
      - "traefik_default"
      - "socket_proxy"
    ports:
      - "4000:4000/tcp"
    restart: "unless-stopped"
    volumes:
      - "vibe-kanban-repos:/repos"
      - "vibe-kanban-cache:/root/.npm/_npx"
      - "vibe-kanban-claude:/root/.claude"
      - "vibe-kanban-data:/root/.local/share/vibe-kanban"
      - "/home/koonan/.ssh:/root/.ssh:ro"
      - "/home/koonan/.gitconfig:/root/.gitconfig:ro"
      # Config volumes (read-only) — for log/config inspection and debugging
      - "bazarr_config:/mnt/configs/bazarr:ro"
      - "prowlarr_config:/mnt/configs/prowlarr:ro"
      - "seerr_config:/mnt/configs/seerr:ro"
      - "qbittorrent_config:/mnt/configs/qbittorrent:ro"
      - "radarr_config:/mnt/configs/radarr:ro"
      - "sonarr_config:/mnt/configs/sonarr:ro"
      - "tautulli_config:/mnt/configs/tautulli:ro"
      - "stirling_config:/mnt/configs/stirling:ro"
      - "samba_config:/mnt/configs/samba:ro"
      - "backrest_backrest_config:/mnt/configs/backrest:ro"

  vibe-kanban-tools:
    image: "ghcr.io/kjsb25/vibe-kanban-tools:latest"
    container_name: "vibe-kanban-tools"
    environment:
      - "VIBE_KANBAN_URL=http://vibe-kanban:4000"
      - "VIBE_KANBAN_API_KEY=${VIBE_KANBAN_API_KEY:-}"
      - "SUBMIT_TOKEN=${VIBE_KANBAN_TOOLS_SUBMIT_TOKEN:-}"
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.vibe-kanban-tools.rule: "Host(`kanban-tools.${NOVA_DOMAIN}`)"
      traefik.http.routers.vibe-kanban-tools.entrypoints: "websecure"
      traefik.http.routers.vibe-kanban-tools.tls: "true"
      traefik.http.routers.vibe-kanban-tools.middlewares: "authelia@file"
      traefik.http.services.vibe-kanban-tools.loadbalancer.server.port: "3000"
      homepage.group: "Development"
      homepage.name: "Vibe Kanban Tools"
      homepage.icon: "https://www.google.com/s2/favicons?domain=vibekanban.com/&sz=128"
      homepage.href: "http://kanban-tools.${NOVA_DOMAIN}"
      homepage.description: "Quick-capture tasks for Vibe Kanban"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3001:3000/tcp"
    restart: "unless-stopped"

  mission-control:
    image: "ghcr.io/builderz-labs/mission-control:latest"
    container_name: "mission-control"
    environment:
      - "PORT=3000"
      - "TZ=${TZ}"
      # Standalone mode — no OpenClaw gateway required. Kanban board, projects,
      # agents CRUD, sessions, scheduler, webhooks, alerts, and cost tracking all
      # work; live gateway events and agent messaging do not.
      - "NEXT_PUBLIC_GATEWAY_OPTIONAL=true"
      # Host allowlist. MC blocks unknown hosts in production.
      - "MC_ALLOWED_HOSTS=mc.${NOVA_DOMAIN},localhost,127.0.0.1"
      - "MC_COOKIE_SECURE=1"
      - "MC_COOKIE_SAMESITE=strict"
      - "MC_ENABLE_HSTS=1"
      # Claude Code bridge — MC scans this dir for CC sessions, teams, and tasks
      # (read-only). Points at the vibe-kanban service's ~/.claude volume so MC
      # sees the same login and history as the CC install running in vibe-kanban.
      # First-run auth still happens interactively at /setup.
      - "MC_CLAUDE_HOME=/claude-home"
      # Optional: enable Authelia SSO passthrough (single sign-on). Requires
      # trusted-IP list matching the traefik_default bridge subnet.
      # - "MC_PROXY_AUTH_HEADER=Remote-User"
      # - "MC_PROXY_AUTH_DEFAULT_ROLE=viewer"
      # - "MC_PROXY_AUTH_TRUSTED_IPS=127.0.0.1,::1"
    healthcheck:
      disable: true  # image ships without curl/wget; upstream compose omits healthcheck
    labels:
      traefik.enable: "true"
      traefik.http.routers.mission-control.rule: "Host(`mc.${NOVA_DOMAIN}`)"
      traefik.http.routers.mission-control.entrypoints: "websecure"
      traefik.http.routers.mission-control.tls: "true"
      traefik.http.routers.mission-control.middlewares: "authelia@file"
      traefik.http.services.mission-control.loadbalancer.server.port: "3000"
      homepage.group: "Development"
      homepage.name: "Mission Control"
      homepage.icon: "https://www.google.com/s2/favicons?domain=mc.builderz.dev&sz=128"
      homepage.href: "https://mc.${NOVA_DOMAIN}"
      homepage.description: "Multi-agent orchestration dashboard (alpha)"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    volumes:
      - "mission_control_data:/app/.data"
      # Read-only view of vibe-kanban's Claude Code home so MC's read-only
      # Claude Code bridge (~/.claude/projects, ~/.claude/teams, ~/.claude/tasks)
      # sees the actual CC login and session history.
      - "vibe-kanban-claude:/claude-home:ro"
    read_only: true
    tmpfs:
      - "/tmp"
      - "/app/.next/cache"
    cap_drop:
      - "ALL"
    cap_add:
      - "NET_BIND_SERVICE"
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256
    restart: "unless-stopped"

volumes:

  vibe-kanban-repos:
    external: true
  # Config volumes — read-only access for log/config inspection
  bazarr_config:
    external: true
  prowlarr_config:
    external: true
  seerr_config:
    external: true
  qbittorrent_config:
    external: true
  radarr_config:
    external: true
  sonarr_config:
    external: true
  tautulli_config:
    external: true
  stirling_config:
    external: true
  samba_config:
    external: true
  backrest_backrest_config:
    external: true

  vibe-kanban-claude:

  vibe-kanban-cache:

  vibe-kanban-data:

  mission_control_data:
    external: true
