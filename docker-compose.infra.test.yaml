# Infra Stack - Test environment overrides
# Remaps ports (+10000 offset), uses test-prefixed volumes and networks
# volume-sharer is excluded (host network mode)

services:

  volume-sharer:
    profiles:
      - "prod-only"

  dockge-dockge-1:
    container_name: "test_dockge"
    networks: !override
      - "test_dockge_default"
      - "test_traefik_default"
    ports: !override
      - "15001:5001/tcp"

  duckdns:
    container_name: "test_duckdns"

  homepage:
    container_name: "test_homepage"
    networks: !override
      - "test_traefik_default"
    ports: !override
      - "13000:3000/tcp"

  portainer:
    container_name: "test_portainer"
    networks: !override
      - "test_traefik_default"
    ports: !override
      - "19000:9000/tcp"
      - "19443:9443/tcp"
    volumes: !override
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "test_portainer_data:/data"

  traefik-traefik-1:
    container_name: "test_traefik"
    networks: !override
      - "test_traefik_default"
    ports: !override
      - "10080:80/tcp"
      - "18080:8080/tcp"
    volumes: !override
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./traefik/dynamic.test.yaml:/etc/traefik/dynamic.yaml:ro"

  wud:
    container_name: "test_wud"
    networks: !override
      - "test_wud_default"
      - "test_traefik_default"
    ports: !override
      - "13003:3000/tcp"

networks:

  dockge_default:
    name: "dockge_default_unused"

  traefik_default:
    name: "traefik_default_unused"

  wud_default:
    name: "wud_default_unused"

  test_dockge_default:
    name: "test_dockge_default"

  test_traefik_default:
    external: true
    name: "test_traefik_default"

  test_wud_default:
    name: "test_wud_default"

volumes:

  volume_sharer_samba_config:
    name: "volume_sharer_samba_config_unused"

  portainer_data:
    name: "portainer_data_unused"

  test_volume_sharer_samba_config:
    name: "test_volume_sharer_samba_config"

  test_portainer_data:
    name: "test_portainer_data"
