# MovieNight Test Stack
# Images tagged :test are built by the deploy-test.yml workflow on each PR push.
# Usage:  docker compose -f docker-compose.movienight-test.yaml up -d
# Requires in .env:  NOVA_DOMAIN  MOVIENIGHT_TEST_DB_PASSWORD  TMDB_API_KEY
# One-time setup:    docker volume create movienight_test_db

name: movienight-test

networks:
  traefik_default:
    external: true
    name: traefik_default
  movienight_test_internal:
    internal: true

services:

  movienight-test-db:
    container_name: movienight-test-db
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: movienight
      POSTGRES_USER: movienight_user
      POSTGRES_PASSWORD: ${MOVIENIGHT_TEST_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movienight_user -d movienight"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movienight_test_internal
    volumes:
      - movienight_test_db:/var/lib/postgresql/data

  movienight-test-backend:
    container_name: movienight-test-backend
    image: ghcr.io/nova-firefly/movienight-backend:test
    restart: unless-stopped
    depends_on:
      movienight-test-db:
        condition: service_healthy
    environment:
      DB_HOST: movienight-test-db
      DB_PORT: 5432
      DB_NAME: movienight
      DB_USER: movienight_user
      DB_PASSWORD: ${MOVIENIGHT_TEST_DB_PASSWORD}
      PORT: 4000
      NODE_ENV: development
      TMDB_API_KEY: ${TMDB_API_KEY}
    labels:
      traefik.enable: "true"
      traefik.http.routers.movienight-test-api.rule: "Host(`movienight-test.${NOVA_DOMAIN}`) && PathPrefix(`/graphql`)"
      traefik.http.routers.movienight-test-api.entrypoints: websecure
      traefik.http.routers.movienight-test-api.tls: "true"
      traefik.http.services.movienight-test-api.loadbalancer.server.port: "4000"
    networks:
      - traefik_default
      - movienight_test_internal

  movienight-test-frontend:
    container_name: movienight-test-frontend
    image: ghcr.io/nova-firefly/movienight:test
    restart: unless-stopped
    depends_on:
      - movienight-test-backend
    labels:
      traefik.enable: "true"
      traefik.http.routers.movienight-test.rule: "Host(`movienight-test.${NOVA_DOMAIN}`)"
      traefik.http.routers.movienight-test.entrypoints: websecure
      traefik.http.routers.movienight-test.tls: "true"
      traefik.http.routers.movienight-test.middlewares: authelia@file
      traefik.http.services.movienight-test.loadbalancer.server.port: "80"
    networks:
      - traefik_default

volumes:
  movienight_test_db:
    external: true
