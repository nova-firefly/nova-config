# Dev/Utility Stack - Vibe Kanban, Vibe Kanban Tools
# Usage: docker compose -f docker-compose.dev.yaml up -d

name: dev

networks:
  traefik_default:
    external: true
    name: "traefik_default"
  socket_proxy:
    external: true
    name: "socket_proxy"
  vibe_remote_internal:
    internal: true

services:

  vibe-kanban:
    build: "./vibe-kanban"
    cap_drop:
      - "AUDIT_CONTROL"
      - "BLOCK_SUSPEND"
      - "DAC_READ_SEARCH"
      - "IPC_LOCK"
      - "IPC_OWNER"
      - "LEASE"
      - "LINUX_IMMUTABLE"
      - "MAC_ADMIN"
      - "MAC_OVERRIDE"
      - "NET_ADMIN"
      - "NET_BROADCAST"
      - "SYSLOG"
      - "SYS_ADMIN"
      - "SYS_BOOT"
      - "SYS_MODULE"
      - "SYS_NICE"
      - "SYS_PACCT"
      - "SYS_PTRACE"
      - "SYS_RAWIO"
      - "SYS_RESOURCE"
      - "SYS_TIME"
      - "SYS_TTY_CONFIG"
      - "WAKE_ALARM"
    container_name: "vibe-kanban"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - "GH_TOKEN=${GH_TOKEN}"
      - "PORT=4000"
      - "TZ=${TZ}"
      - "IS_SANDBOX=1"
      - "DOCKER_HOST=tcp://socket-proxy:2375"
      - "VK_SHARED_API_BASE=https://kanban-remote.${NOVA_DOMAIN}"
    hostname: "${NOVA_HOSTNAME}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.vibe-kanban.rule: "Host(`kanban.${NOVA_DOMAIN}`)"
      traefik.http.routers.vibe-kanban.entrypoints: "websecure"
      traefik.http.routers.vibe-kanban.tls: "true"
      traefik.http.routers.vibe-kanban.middlewares: "authelia@file"
      traefik.http.services.vibe-kanban.loadbalancer.server.port: "4000"
      homepage.group: "Development"
      homepage.name: "Vibe Kanban"
      homepage.icon: "https://www.google.com/s2/favicons?domain=vibekanban.com/&sz=128"
      homepage.href: "http://kanban.${NOVA_DOMAIN}"
      homepage.description: "Project Management"
      wud.watch: "false"
    networks:
      - "traefik_default"
      - "socket_proxy"
      - "vibe_remote_internal"
    ports:
      - "4000:4000/tcp"
    restart: "unless-stopped"
    volumes:
      - "vibe-kanban-repos:/repos"
      - "vibe-kanban-cache:/root/.npm/_npx"
      - "vibe-kanban-claude:/root/.claude"
      - "vibe-kanban-data:/root/.local/share/vibe-kanban"
      - "/home/koonan/.ssh:/root/.ssh:ro"
      - "/home/koonan/.gitconfig:/root/.gitconfig:ro"
      # Config volumes (read-only) — for log/config inspection and debugging
      - "bazarr_config:/mnt/configs/bazarr:ro"
      - "prowlarr_config:/mnt/configs/prowlarr:ro"
      - "seerr_config:/mnt/configs/seerr:ro"
      - "qbittorrent_config:/mnt/configs/qbittorrent:ro"
      - "radarr_config:/mnt/configs/radarr:ro"
      - "sonarr_config:/mnt/configs/sonarr:ro"
      - "tautulli_config:/mnt/configs/tautulli:ro"
      - "stirling_config:/mnt/configs/stirling:ro"
      - "samba_config:/mnt/configs/samba:ro"
      - "backrest_backrest_config:/mnt/configs/backrest:ro"

  vibe-kanban-tools:
    image: "ghcr.io/kjsb25/vibe-kanban-tools:latest"
    container_name: "vibe-kanban-tools"
    environment:
      - "VIBE_KANBAN_URL=http://vibe-kanban:4000"
      - "VIBE_KANBAN_API_KEY=${VIBE_KANBAN_API_KEY:-}"
      - "SUBMIT_TOKEN=${VIBE_KANBAN_TOOLS_SUBMIT_TOKEN:-}"
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.vibe-kanban-tools.rule: "Host(`kanban-tools.${NOVA_DOMAIN}`)"
      traefik.http.routers.vibe-kanban-tools.entrypoints: "websecure"
      traefik.http.routers.vibe-kanban-tools.tls: "true"
      traefik.http.routers.vibe-kanban-tools.middlewares: "authelia@file"
      traefik.http.services.vibe-kanban-tools.loadbalancer.server.port: "3000"
      homepage.group: "Development"
      homepage.name: "Vibe Kanban Tools"
      homepage.icon: "https://www.google.com/s2/favicons?domain=vibekanban.com/&sz=128"
      homepage.href: "http://kanban-tools.${NOVA_DOMAIN}"
      homepage.description: "Quick-capture tasks for Vibe Kanban"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.dev,discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3001:3000/tcp"
    restart: "unless-stopped"

  vibe-kanban-remote-db:
    image: "postgres:16-alpine"
    container_name: "vibe-kanban-remote-db"
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: "remote"
      POSTGRES_USER: "remote"
      POSTGRES_PASSWORD: "${VIBE_REMOTE_DB_PASSWORD}"
      TZ: "${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote -d remote"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      wud.watch: "false"
    networks:
      - "vibe_remote_internal"
    restart: "unless-stopped"
    volumes:
      - "vibe-kanban-remote-db:/var/lib/postgresql/data"

  vibe-kanban-electric:
    image: "electricsql/electric:1.4.13"
    container_name: "vibe-kanban-electric"
    depends_on:
      vibe-kanban-remote-db:
        condition: "service_healthy"
      vibe-kanban-remote:
        condition: "service_healthy"
    environment:
      DATABASE_URL: "postgresql://electric_sync:${VIBE_REMOTE_ELECTRIC_PASSWORD}@vibe-kanban-remote-db:5432/remote?sslmode=disable"
      PG_PROXY_PORT: "65432"
      LOGICAL_PUBLISHER_HOST: "vibe-kanban-electric"
      AUTH_MODE: "insecure"
      ELECTRIC_INSECURE: "true"
      ELECTRIC_MANUAL_TABLE_PUBLISHING: "true"
      ELECTRIC_USAGE_REPORTING: "false"
      ELECTRIC_FEATURE_FLAGS: "allow_subqueries,tagged_subqueries"
      TZ: "${TZ}"
    labels:
      wud.watch: "true"
      wud.watch.digest: "false"
      wud.trigger.include: "discord.notify"
    networks:
      - "vibe_remote_internal"
    restart: "unless-stopped"
    volumes:
      - "vibe-kanban-electric:/app/persistent"

  vibe-kanban-remote:
    build:
      context: "./vibe-kanban-remote"
      dockerfile: "crates/remote/Dockerfile"
      args:
        VITE_RELAY_API_BASE_URL: "https://kanban-remote.${NOVA_DOMAIN}"
    container_name: "vibe-kanban-remote"
    depends_on:
      vibe-kanban-remote-db:
        condition: "service_healthy"
    environment:
      RUST_LOG: "info,remote=info"
      SERVER_DATABASE_URL: "postgres://remote:${VIBE_REMOTE_DB_PASSWORD}@vibe-kanban-remote-db:5432/remote"
      SERVER_LISTEN_ADDR: "0.0.0.0:8081"
      ELECTRIC_URL: "http://vibe-kanban-electric:3000"
      ELECTRIC_ROLE_PASSWORD: "${VIBE_REMOTE_ELECTRIC_PASSWORD}"
      SERVER_PUBLIC_BASE_URL: "https://kanban-remote.${NOVA_DOMAIN}"
      VIBEKANBAN_REMOTE_JWT_SECRET: "${VIBE_REMOTE_JWT_SECRET}"
      SELF_HOST_LOCAL_AUTH_EMAIL: "${VIBE_REMOTE_BOOTSTRAP_EMAIL}"
      SELF_HOST_LOCAL_AUTH_PASSWORD: "${VIBE_REMOTE_BOOTSTRAP_PASSWORD}"
      TZ: "${TZ}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.vibe-kanban-remote.rule: "Host(`kanban-remote.${NOVA_DOMAIN}`)"
      traefik.http.routers.vibe-kanban-remote.entrypoints: "websecure"
      traefik.http.routers.vibe-kanban-remote.tls: "true"
      traefik.http.services.vibe-kanban-remote.loadbalancer.server.port: "8081"
      homepage.group: "Development"
      homepage.name: "Vibe Kanban Remote"
      homepage.icon: "https://www.google.com/s2/favicons?domain=vibekanban.com/&sz=128"
      homepage.href: "https://kanban-remote.${NOVA_DOMAIN}"
      homepage.description: "Self-hosted Vibe Kanban backend"
      wud.watch: "false"
    networks:
      - "traefik_default"
      - "vibe_remote_internal"
    restart: "unless-stopped"

volumes:

  vibe-kanban-repos:
    external: true
  # Config volumes — read-only access for log/config inspection
  bazarr_config:
    external: true
  prowlarr_config:
    external: true
  seerr_config:
    external: true
  qbittorrent_config:
    external: true
  radarr_config:
    external: true
  sonarr_config:
    external: true
  tautulli_config:
    external: true
  stirling_config:
    external: true
  samba_config:
    external: true
  backrest_backrest_config:
    external: true

  vibe-kanban-claude:

  vibe-kanban-cache:

  vibe-kanban-data:

  vibe-kanban-remote-db:

  vibe-kanban-electric:
