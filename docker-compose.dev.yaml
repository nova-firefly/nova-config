# Dev/Utility Stack - Vibe Kanban
# Usage: docker compose -f docker-compose.dev.yaml up -d

services:

  vibe-kanban:
    cap_drop:
      - "AUDIT_CONTROL"
      - "BLOCK_SUSPEND"
      - "DAC_READ_SEARCH"
      - "IPC_LOCK"
      - "IPC_OWNER"
      - "LEASE"
      - "LINUX_IMMUTABLE"
      - "MAC_ADMIN"
      - "MAC_OVERRIDE"
      - "NET_ADMIN"
      - "NET_BROADCAST"
      - "SYSLOG"
      - "SYS_ADMIN"
      - "SYS_BOOT"
      - "SYS_MODULE"
      - "SYS_NICE"
      - "SYS_PACCT"
      - "SYS_PTRACE"
      - "SYS_RAWIO"
      - "SYS_RESOURCE"
      - "SYS_TIME"
      - "SYS_TTY_CONFIG"
      - "WAKE_ALARM"
    container_name: "vibe-kanban"
    environment:
      - "PORT=3000"
    hostname: "${NOVA_HOSTNAME}"
    image: "vibe-kanban:latest"
    labels:
      homepage.group: "Development"
      homepage.name: "Vibe Kanban"
      homepage.icon: "kanban.svg"
      homepage.href: "http://kanban.${NOVA_DOMAIN}"
      homepage.description: "Project Management"
    network_mode: "host"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "vibe-kanban-repos:/repos"

volumes:

  vibe-kanban-repos:
    external: true
