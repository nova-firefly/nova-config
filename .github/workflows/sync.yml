name: Sync to Nova

# Mirrors the host's nova-config working tree with the main branch.
# - Push: syncs immediately when main changes
# - Schedule: every 6h as a safety net for missed push events / runner downtime
# - Dispatch: manual trigger via GitHub UI
#
# Runs on a self-hosted runner because inbound SSH is dropped at our WAN
# (only 80/443 are forwarded in). The runner sits on the LAN, polls GitHub
# outbound, and `git reset --hard`s the bind-mounted host repo. See
# runner/compose.yaml for the runner deployment and security model.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    # Both labels required — pairs with LABELS in runner/compose.yaml so other
    # workflows with bare `runs-on: self-hosted` cannot land on this runner.
    runs-on: [self-hosted, nova-config-sync]
    timeout-minutes: 5
    # No actions/checkout: it would clone into the runner's _work dir. We want
    # to update the bind-mounted host repo in place.
    permissions:
      contents: read
    steps:
      - name: Sync nova-config working tree
        working-directory: /home/runner/nova-config
        run: |
          git fetch --prune origin
          git reset --hard origin/main
