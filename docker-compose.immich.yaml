# Immich Stack - Photo management with ML, Postgres, and Redis
# Usage: docker compose -f docker-compose.immich.yaml up -d
# Requires .env file for: IMMICH_DB_PASSWORD, NOVA_DOMAIN, NOVA_TRAEFIK_SUFFIX

networks:
  immich_default:
    external: true
    name: "immich_default"
  traefik_default:
    external: true
    name: "traefik_default"

services:

  immich_machine_learning:
    container_name: "immich_machine_learning"
    environment:
      - "IMMICH_VERSION=release"
      - "DB_PASSWORD=${IMMICH_DB_PASSWORD}"
      - "DB_USERNAME=postgres"
      - "DB_DATABASE_NAME=immich"
      - "UPLOAD_LOCATION=/data3/immich_data"
      - "DB_DATA_LOCATION=./postgres"
      - "TZ=${TZ}"
    image: "ghcr.io/immich-app/immich-machine-learning:release"
    networks:
      - "immich_default"
    restart: "always"
    volumes:
      - "immich_immich-ml-model-cache:/cache"

  immich_postgres:
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    container_name: "immich_postgres"
    environment:
      - "POSTGRES_INITDB_ARGS=--data-checksums"
      - "POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}"
      - "POSTGRES_USER=postgres"
      - "POSTGRES_DB=immich"
      - "DB_STORAGE_TYPE=SSD"
    expose:
      - "5432/tcp"
    image: "ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:32324a2f41df5de9efe1af166b7008c3f55646f8d0e00d9550c16c9822366b4a"
    networks:
      - "immich_default"
    restart: "always"
    volumes:
      - "/home/koonan/immich-app/postgres:/var/lib/postgresql/data"

  immich_redis:
    container_name: "immich_redis"
    expose:
      - "6379/tcp"
    image: "docker.io/valkey/valkey:8-bookworm@sha256:a137a2b60aca1a75130022d6bb96af423fefae4eb55faf395732db3544803280"
    networks:
      - "immich_default"
    restart: "always"
    volumes:
      - "eeba826780300f3d846b69ccaecc2f70dc9dd09cdb8ce35b3eb4462d5ee3b122:/data"

  immich_server:
    container_name: "immich_server"
    environment:
      - "IMMICH_VERSION=release"
      - "DB_PASSWORD=${IMMICH_DB_PASSWORD}"
      - "DB_USERNAME=postgres"
      - "DB_DATABASE_NAME=immich"
      - "UPLOAD_LOCATION=/data3/immich_data"
      - "DB_DATA_LOCATION=./postgres"
      - "TZ=${TZ}"
      - "NVIDIA_DRIVER_CAPABILITIES=all"
      - "NVIDIA_VISIBLE_DEVICES=all"
    image: "ghcr.io/immich-app/immich-server:release"
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich.rule: "Host(`immich${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.immich.entrypoints: "web"
      traefik.http.services.immich.loadbalancer.server.port: "2283"
    networks:
      - "immich_default"
      - "traefik_default"
    ports:
      - "2283:2283/tcp"
    restart: "always"
    volumes:
      - "/data3/immich_data:/data"
      - "/etc/localtime:/etc/localtime:ro"

volumes:

  eeba826780300f3d846b69ccaecc2f70dc9dd09cdb8ce35b3eb4462d5ee3b122:
    external: true

  immich_immich-ml-model-cache:
    external: true
