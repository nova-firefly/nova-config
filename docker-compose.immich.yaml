      org.opencontainers.image.url: "https://github.com/immich-app/immich"
      org.opencontainers.image.version: "v2.2.3"
    logging:
      driver: "json-file"
      options: {}
    networks:
      - "immich_default"
    restart: "always"
    volumes:
      - "immich_immich-ml-model-cache:/cache"
    working_dir: "/usr/src"

  immich_postgres:
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    container_name: "immich_postgres"
    entrypoint:
      - "/usr/local/bin/immich-docker-entrypoint.sh"
    environment:
      - "POSTGRES_INITDB_ARGS=--data-checksums"
      - "POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}"
      - "POSTGRES_USER=postgres"
      - "POSTGRES_DB=immich"
      - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/lib/postgresql/14/bin"
      - "GOSU_VERSION=1.17"
      - "LANG=en_US.utf8"
      - "PG_MAJOR=14"
      - "PG_VERSION=14.18-1.pgdg120+1"
      - "PGDATA=/var/lib/postgresql/data"
      - "DB_STORAGE_TYPE=SSD"
    expose:
      - "5432/tcp"
    hostname: "6649e79b630e"
    image: "ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:32324a2f41df5de9efe1af166b7008c3f55646f8d0e00d9550c16c9822366b4a"
    ipc: "private"
    labels:
      com.docker.compose.config-hash: "ff35c289ecbec99e2d84d5db5a4cca70491c0ee181ab9109f4a768a0255d13eb"
