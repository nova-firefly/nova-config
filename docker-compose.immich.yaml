# Immich Stack - Photo management with ML, Postgres, and Redis
# Usage: docker compose -f docker-compose.immich.yaml up -d
# Requires .env file for: IMMICH_DB_PASSWORD, NOVA_DOMAIN, IMMICH_POWER_TOOLS_API_KEY

name: immich

networks:
  traefik_default:
    external: true
    name: "traefik_default"
  immich_default:
    name: "immich_default"

services:

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - "TZ=${TZ}"
      - "DB_PASSWORD=${IMMICH_DB_PASSWORD}"
      - "IMMICH_DB_PATH=${IMMICH_DB_PATH}"
      - "UPLOAD_LOCATION=${UPLOAD_LOCATION}"
      - "DB_DATA_LOCATION=${DB_DATA_LOCATION}"
      - "DB_USERNAME=${DB_USERNAME}"
      - "DB_DATABASE_NAME=${DB_DATABASE_NAME}"
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:2283/api/server/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich.rule: "Host(`immich.${NOVA_DOMAIN}`)"
      traefik.http.routers.immich.entrypoints: "websecure"
      traefik.http.routers.immich.tls: "true"
      traefik.http.services.immich.loadbalancer.server.port: "2283"
      homepage.group: "Media"
      homepage.name: "Immich"
      homepage.icon: "immich.svg"
      homepage.href: "http://immich.${NOVA_DOMAIN}"
      homepage.description: "Photo Management"
      wud.watch: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - immich_default
      - traefik_default

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    labels:
      wud.watch: "true"
      wud.trigger.include: "discord.notify"
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - immich-ml-model-cache:/cache
    environment:
      # Keep models loaded for 1 hour instead of 5 minutes to avoid cold-start freezes
      MACHINE_LEARNING_MODEL_TTL: 3600
      # ONNX thread tuning for 4-core host (1 worker × 4 intra-op threads)
      MACHINE_LEARNING_WORKERS: 1
      MACHINE_LEARNING_INTRA_OP_THREADS: 4
      MACHINE_LEARNING_INTER_OP_THREADS: 1
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
    networks:
      - immich_default

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:a137a2b60aca1a75130022d6bb96af423fefae4eb55faf395732db3544803280
    labels:
      wud.watch: "false"
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - immich_default

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:32324a2f41df5de9efe1af166b7008c3f55646f8d0e00d9550c16c9822366b4a
    labels:
      wud.watch: "false"
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 256mb
    restart: always
    networks:
      - immich_default

  immich-power-tools:
    container_name: immich_power_tools
    image: ghcr.io/immich-power-tools/immich-power-tools:latest
    environment:
      - "IMMICH_URL=http://immich_server:2283"
      - "EXTERNAL_IMMICH_URL=https://immich.${NOVA_DOMAIN}"
      - "IMMICH_API_KEY=${IMMICH_POWER_TOOLS_API_KEY}"
      - "DB_HOST=immich_postgres"
      - "DB_PORT=5432"
      - "DB_USERNAME=${DB_USERNAME}"
      - "DB_DATABASE_NAME=${DB_DATABASE_NAME}"
      - "DB_PASSWORD=${IMMICH_DB_PASSWORD}"
    volumes:
      - "immich_power_tools_data:/app/data"
    depends_on:
      - database
      - immich-server
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    cap_drop:
      - "AUDIT_CONTROL"
      - "BLOCK_SUSPEND"
      - "DAC_READ_SEARCH"
      - "IPC_LOCK"
      - "IPC_OWNER"
      - "LEASE"
      - "LINUX_IMMUTABLE"
      - "MAC_ADMIN"
      - "MAC_OVERRIDE"
      - "NET_ADMIN"
      - "NET_BROADCAST"
      - "SYSLOG"
      - "SYS_ADMIN"
      - "SYS_BOOT"
      - "SYS_MODULE"
      - "SYS_NICE"
      - "SYS_PACCT"
      - "SYS_PTRACE"
      - "SYS_RAWIO"
      - "SYS_RESOURCE"
      - "SYS_TIME"
      - "SYS_TTY_CONFIG"
      - "WAKE_ALARM"
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich-power-tools.rule: "Host(`immich-power-tools.${NOVA_DOMAIN}`)"
      traefik.http.routers.immich-power-tools.entrypoints: "websecure"
      traefik.http.routers.immich-power-tools.tls: "true"
      traefik.http.services.immich-power-tools.loadbalancer.server.port: "3000"
      homepage.group: "Media"
      homepage.name: "Immich Power Tools"
      homepage.icon: "immich.svg"
      homepage.href: "https://immich-power-tools.${NOVA_DOMAIN}"
      homepage.description: "Immich Library Organizer"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - immich_default
      - traefik_default

volumes:
  immich-ml-model-cache:
  immich_power_tools_data:
    external: true