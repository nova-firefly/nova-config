      org.opencontainers.image.version: "14-vectorchord0.4.3-pgvector0.8.0-pgvectors0.2.0"
    logging:
      driver: "json-file"
      options: {}
    networks:
      - "immich_default"
    restart: "always"
    volumes:
      - "/home/koonan/immich-app/postgres:/var/lib/postgresql/data"

  immich_redis:
