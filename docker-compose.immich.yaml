# Immich Stack - Photo management with ML, Postgres, and Redis
# Usage: docker compose -f docker-compose.immich.yaml up -d
# Requires .env file for: IMMICH_DB_PASSWORD

networks:
  immich_default:
    external: true
    name: "immich_default"

services:

  immich_machine_learning:
    command:
      - "python"
      - "-m"
      - "immich_ml"
    container_name: "immich_machine_learning"
    entrypoint:
      - "tini"
      - "--"
    environment:
      - "IMMICH_VERSION=release"
      - "DB_PASSWORD=${IMMICH_DB_PASSWORD}"
      - "DB_USERNAME=postgres"
      - "DB_DATABASE_NAME=immich"
      - "UPLOAD_LOCATION=/data3/immich_data"
      - "DB_DATA_LOCATION=./postgres"
      - "TZ=America/Denver"
      - "PATH=/opt/venv/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "LANG=C.UTF-8"
      - "GPG_KEY=A035C8C19219BA821ECEA86B64E628F8D684696D"
      - "PYTHON_VERSION=3.11.13"
      - "PYTHON_SHA256=8fb5f9fbc7609fa822cb31549884575db7fd9657cbffb89510b5d7975963a83a"
      - "LD_PRELOAD=/usr/lib/libmimalloc.so.2"
      - "MACHINE_LEARNING_MODEL_ARENA=false"
      - "TRANSFORMERS_CACHE=/cache"
      - "PYTHONDONTWRITEBYTECODE=1"
      - "PYTHONUNBUFFERED=1"
      - "PYTHONPATH=/usr/src"
      - "DEVICE=cpu"
      - "VIRTUAL_ENV=/opt/venv"
      - "MACHINE_LEARNING_CACHE_FOLDER=/cache"
      - "IMMICH_BUILD=19104095433"
      - "IMMICH_BUILD_URL=https://github.com/immich-app/immich/actions/runs/19104095433"
      - "IMMICH_BUILD_IMAGE=v2.2.3"
      - "IMMICH_BUILD_IMAGE_URL=https://github.com/immich-app/immich/pkgs/container/immich-machine-learning"
      - "IMMICH_REPOSITORY=immich-app/immich"
      - "IMMICH_REPOSITORY_URL=https://github.com/immich-app/immich"
      - "IMMICH_SOURCE_REF=v2.2.3"
      - "IMMICH_SOURCE_COMMIT=28eb1bc13cfd4642fe90fd8cf724ba7acf94f675"
      - "IMMICH_SOURCE_URL=https://github.com/immich-app/immich/commit/28eb1bc13cfd4642fe90fd8cf724ba7acf94f675"
    hostname: "2c80652fc6f9"
    image: "ghcr.io/immich-app/immich-machine-learning:release"
    ipc: "private"
    labels:
      com.docker.compose.config-hash: "92e3e77f2dd37337a729acf8afc4c4e4aaaa7f5470e4d61471cf5446410dcfea"
      com.docker.compose.container-number: "1"
      com.docker.compose.depends_on: ""
      com.docker.compose.image: "sha256:cbaddc4758c400262039a03eb39ad4d6a06faeb31ece46a6594701fc9529affc"
      com.docker.compose.oneoff: "False"
      com.docker.compose.project: "immich"
      com.docker.compose.project.config_files: "/home/koonan/immich-app/docker-compose.yml"
      com.docker.compose.project.working_dir: "/home/koonan/immich-app"
      com.docker.compose.service: "immich-machine-learning"
      com.docker.compose.version: "2.35.1"
      org.opencontainers.image.created: "2025-11-05T13:47:44.676Z"
      org.opencontainers.image.description: "High performance self-hosted photo and video management solution."
      org.opencontainers.image.licenses: "AGPL-3.0"
