# Media Stack - Test environment overrides
# Remaps ports (+10000 offset), uses test-prefixed volumes and networks
# Plex is excluded (host network mode - cannot remap ports)

services:

  plex:
    profiles:
      - "prod-only"

  bazarr:
    container_name: "test_bazarr"
    ports: !override
      - "16767:6767/tcp"
    volumes: !override
      - "/data1/plex_data_1/_data/movies:/plex_movies_1"
      - "/data1/plex_data_1/_data/tv:/plex_tv_1"
      - "/data2/movies:/plex_movies_2"
      - "/data2/tv:/plex_tv_2"
      - "/data3/movies:/plex_movies_3"
      - "/data3/tv:/plex_tv_3"
      - "/opt/subcleaner:/opt/subcleaner"
      - "test_bazarr_config:/config"

  overseerr:
    container_name: "test_overseerr"
    ports: !override
      - "15055:5055/tcp"
    volumes: !override
      - "test_overseerr_config:/config"

  prowlarr:
    container_name: "test_prowlarr"
    networks: !override
      - "test_media"
    ports: !override
      - "19696:9696/tcp"
    volumes: !override
      - "/path/to/prowlarr/data-test:/config"

  radarr:
    container_name: "test_radarr"
    networks: !override
      - "test_media"
    ports: !override
      - "17878:7878/tcp"
    volumes: !override
      - "/data1/plex_data_1/_data/movies:/plex_movies_1"
      - "/data2/movies:/plex_movies_2"
      - "/data3/movies:/plex_movies_3"
      - "test_radarr_config:/config"
      - "test_transmission_data:/downloads"

  sonarr:
    container_name: "test_sonarr"
    networks: !override
      - "test_media"
    ports: !override
      - "18989:8989/tcp"
    volumes: !override
      - "/data1/plex_data_1/_data/tv:/plex_tv_1"
      - "/data2/tv:/plex_tv_2"
      - "/data3/tv:/plex_tv_3"
      - "test_sonarr_config:/config"
      - "test_transmission_data:/downloads"

  tautulli:
    container_name: "test_tautulli"
    ports: !override
      - "18181:8181/tcp"
    volumes: !override
      - "test_tautulli_config:/config"

  gluetun:
    container_name: "test_gluetun"
    networks: !override
      - "test_media"
    ports: !override
      - "19094:9091/tcp"
    volumes: !override
      - "test_gluetun_data:/gluetun"

  transmission:
    container_name: "test_transmission"
    volumes: !override
      - "test_transmission_config:/config"
      - "test_transmission_data:/downloads"

networks:

  media:
    name: "media_unused"

  test_media:
    name: "test_media"

volumes:

  bazarr_config:
    name: "bazarr_config_unused"

  gluetun_data:
    name: "gluetun_data_unused"

  overseerr_config:
    name: "overseerr_config_unused"

  radarr_config:
    name: "radarr_config_unused"

  sonarr_config:
    name: "sonarr_config_unused"

  tautulli_config:
    name: "tautulli_config_unused"

  transmission_config:
    name: "transmission_config_unused"

  transmission_data:
    name: "transmission_data_unused"

  test_bazarr_config:
    name: "test_bazarr_config"

  test_gluetun_data:
    name: "test_gluetun_data"

  test_overseerr_config:
    name: "test_overseerr_config"

  test_radarr_config:
    name: "test_radarr_config"

  test_sonarr_config:
    name: "test_sonarr_config"

  test_tautulli_config:
    name: "test_tautulli_config"

  test_transmission_config:
    name: "test_transmission_config"

  test_transmission_data:
    name: "test_transmission_data"
