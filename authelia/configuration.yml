---
# Authelia Configuration
# X_AUTHELIA_CONFIG_FILTERS=template is set in docker-compose.authelia.yaml,
# enabling {{ env "VAR" }} Go template interpolation in this file.
#
# Secrets are NOT stored here — they are injected via environment variables:
#   AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET → jwt secret
#   AUTHELIA_SESSION_SECRET                                 → session secret
#   AUTHELIA_STORAGE_ENCRYPTION_KEY                        → storage encryption key

theme: dark

server:
  address: "tcp://0.0.0.0:9091"

log:
  level: info
  format: text

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      argon2:
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

totp:
  issuer: '{{ env "NOVA_DOMAIN" }}'
  period: 30
  skew: 1

access_control:
  default_policy: two_factor

session:
  name: authelia_session
  same_site: lax
  inactivity: 1h
  expiration: 8h
  remember_me: 7d
  redis:
    host: redis
    port: 6379
  cookies:
    - name: authelia_session
      domain: '{{ env "NOVA_DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "NOVA_DOMAIN" }}'
      default_redirection_url: 'https://home.{{ env "NOVA_DOMAIN" }}'

storage:
  local:
    path: /config/data/db.sqlite3

notifier:
  filesystem:
    filename: /tmp/authelia_notifications.txt

identity_validation:
  reset_password:
    jwt_secret: "placeholder-overridden-by-AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET-env"
