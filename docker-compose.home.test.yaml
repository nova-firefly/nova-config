# Home Stack - Test environment overrides
# Remaps ports (+10000 offset), uses test-prefixed volumes and networks
# homeassistant and music-assistant-server are excluded (host network mode)

services:

  homeassistant:
    profiles:
      - "prod-only"

  music-assistant-server:
    profiles:
      - "prod-only"

  zwave-js-ui:
    container_name: "test_zwave-js-ui"
    networks: !override
      - "test_zwave_zwave"
      - "test_traefik_default"
    ports: !override
      - "13002:3000/tcp"
      - "18091:8091/tcp"
    volumes: !override
      - "test_zwave-js-ui:/usr/src/app/store"

networks:

  zwave_zwave:
    name: "zwave_zwave_unused"

  traefik_default:
    name: "traefik_default_unused"

  test_zwave_zwave:
    name: "test_zwave_zwave"

  test_traefik_default:
    external: true
    name: "test_traefik_default"

volumes:

  ha_config:
    name: "ha_config_unused"

  zwave-js-ui:
    name: "zwave-js-ui_unused"

  test_ha_config:
    name: "test_ha_config"

  test_zwave-js-ui:
    name: "test_zwave-js-ui"
