# Infrastructure Stack - Traefik, Portainer, Dockge, WUD, DuckDNS, Homepage, Volume Sharer
# Usage: docker compose -f docker-compose.infra.yaml up -d
# Requires .env file for: DUCKDNS_TOKEN

networks:
  dockge_default:
    external: true
    name: "dockge_default"
  traefik_default:
    external: true
    name: "traefik_default"
  wud_default:
    external: true
    name: "wud_default"

services:

  dockge-dockge-1:
    container_name: "dockge-dockge-1"
    environment:
      - "DOCKGE_STACKS_DIR=/opt/stacks"
    image: "louislam/dockge:1"
    networks:
      - "dockge_default"
    ports:
      - "5001:5001/tcp"
    restart: "unless-stopped"
    volumes:
      - "/opt/dockge/data:/app/data"
      - "/opt/stacks:/opt/stacks"
      - "/var/run/docker.sock:/var/run/docker.sock"

  duckdns:
    container_name: "duckdns"
    environment:
      - "SUBDOMAINS=firefly-koonan"
      - "TOKEN=${DUCKDNS_TOKEN}"
    image: "lscr.io/linuxserver/duckdns:latest"
    restart: "unless-stopped"

  homepage:
    container_name: "homepage"
    image: "ghcr.io/gethomepage/homepage:latest"
    environment:
      - "PUID=${PUID}"
      - "PGID=${PGID}"
      - "TZ=${TZ}"
    ports:
      - "3000:3000/tcp"
    restart: "unless-stopped"
    volumes:
      - "homepage_config:/app/config"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  portainer:
    container_name: "portainer"
    image: "portainer/portainer-ce:latest"
    labels:
      io.portainer.server: "true"
    ports:
      - "9000:9000/tcp"
      - "9443:9443/tcp"
    restart: "always"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"

  traefik-traefik-1:
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    container_name: "traefik-traefik-1"
    image: "traefik:v3.6"
    networks:
      - "traefik_default"
    ports:
      - "80:80/tcp"
      - "8080:8080/tcp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  volume-sharer:
    container_name: "volume-sharer"
    environment:
      - "USERID=0"
      - "GROUPID=0"
    hostname: "${NOVA_HOSTNAME}"
    image: "gdiepen/volume-sharer"
    network_mode: "host"
    ports:
      - "139:139/tcp"
      - "445:445/tcp"
    restart: "unless-stopped"
    volumes:
      - "/var/lib/docker/volumes:/docker_volumes"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "d38249258c4c2870a526afa1ff60410a6ef5c618649a43f795388a9cd0d69b12:/etc/samba"

  wud:
    container_name: "wud"
    environment:
      - "WUD_LOG_FORMAT=text"
    image: "getwud/wud"
    networks:
      - "wud_default"
    ports:
      - "3003:3000/tcp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:

  d38249258c4c2870a526afa1ff60410a6ef5c618649a43f795388a9cd0d69b12:
    external: true

  homepage_config:
    external: true

  portainer_data:
    external: true
