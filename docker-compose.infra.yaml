# Infrastructure Stack - Traefik, Portainer, Dockge, WUD, DuckDNS, Homepage, Volume Sharer
# Usage: docker compose -f docker-compose.infra.yaml up -d
# Requires .env file for: DUCKDNS_TOKEN, NOVA_DOMAIN, NOVA_TRAEFIK_SUFFIX

networks:
  dockge_default:
    external: true
    name: "dockge_default"
  traefik_default:
    external: true
    name: "traefik_default"
  wud_default:
    external: true
    name: "wud_default"

services:

  dockge-dockge-1:
    container_name: "dockge-dockge-1"
    environment:
      - "DOCKGE_STACKS_DIR=/opt/stacks"
    image: "louislam/dockge:1"
    labels:
      traefik.enable: "true"
      traefik.http.routers.dockge.rule: "Host(`dockge${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.dockge.entrypoints: "websecure"
      traefik.http.routers.dockge.tls: "true"
      traefik.http.services.dockge.loadbalancer.server.port: "5001"
    networks:
      - "dockge_default"
      - "traefik_default"
    ports:
      - "5001:5001/tcp"
    restart: "unless-stopped"
    volumes:
      - "/opt/dockge/data:/app/data"
      - "/opt/stacks:/opt/stacks"
      - "/var/run/docker.sock:/var/run/docker.sock"

  duckdns:
    container_name: "duckdns"
    environment:
      - "SUBDOMAINS=firefly-koonan"
      - "TOKEN=${DUCKDNS_TOKEN}"
    image: "lscr.io/linuxserver/duckdns:latest"
    restart: "unless-stopped"

  homepage:
    container_name: "homepage"
    image: "ghcr.io/gethomepage/homepage:latest"
    environment:
      - "PUID=${PUID}"
      - "PGID=${PGID}"
      - "TZ=${TZ}"
      - "HOMEPAGE_ALLOWED_HOSTS=${NOVA_HOSTNAME}:3000,${NOVA_DOMAIN}:3000,${NOVA_HOSTNAME}:13000,home${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.homepage.rule: "Host(`home${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.homepage.entrypoints: "websecure"
      traefik.http.routers.homepage.tls: "true"
      traefik.http.services.homepage.loadbalancer.server.port: "3000"
    networks:
      - "traefik_default"
    ports:
      - "3000:3000/tcp"
    restart: "unless-stopped"
    volumes:
      - "homepage_config:/app/config"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  portainer:
    container_name: "portainer"
    image: "portainer/portainer-ce:latest"
    labels:
      io.portainer.server: "true"
      traefik.enable: "true"
      traefik.http.routers.portainer.rule: "Host(`portainer${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.portainer.entrypoints: "websecure"
      traefik.http.routers.portainer.tls: "true"
      traefik.http.services.portainer.loadbalancer.server.port: "9000"
    networks:
      - "traefik_default"
    ports:
      - "9000:9000/tcp"
      - "9443:9443/tcp"
    restart: "always"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"

  traefik-traefik-1:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=traefik_default"
      - "--providers.file.filename=/etc/traefik/dynamic.yaml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--entrypoints.websecure.http.tls.domains[0].main=${NOVA_DOMAIN}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.${NOVA_DOMAIN}"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=duckdns"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=30"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
    container_name: "traefik-traefik-1"
    environment:
      - "DUCKDNS_TOKEN=${DUCKDNS_TOKEN}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: "traefik:v3.6"
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik-dashboard.rule: "Host(`traefik${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.traefik-dashboard.entrypoints: "websecure"
      traefik.http.routers.traefik-dashboard.tls: "true"
      traefik.http.routers.traefik-dashboard.service: "api@internal"
    networks:
      - "traefik_default"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    restart: "unless-stopped"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro"
      - "traefik_acme:/letsencrypt"

  volume-sharer:
    container_name: "volume-sharer"
    environment:
      - "USERID=0"
      - "GROUPID=0"
    hostname: "${NOVA_HOSTNAME}"
    image: "gdiepen/volume-sharer"
    network_mode: "host"
    ports:
      - "139:139/tcp"
      - "445:445/tcp"
    restart: "unless-stopped"
    volumes:
      - "/var/lib/docker/volumes:/docker_volumes"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "volume_sharer_samba_config:/etc/samba"

  wud:
    container_name: "wud"
    environment:
      - "WUD_LOG_FORMAT=text"
    image: "getwud/wud"
    labels:
      traefik.enable: "true"
      traefik.http.routers.wud.rule: "Host(`wud${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.wud.entrypoints: "websecure"
      traefik.http.routers.wud.tls: "true"
      traefik.http.services.wud.loadbalancer.server.port: "3000"
    networks:
      - "wud_default"
      - "traefik_default"
    ports:
      - "3003:3000/tcp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:

  traefik_acme:
    external: true

  volume_sharer_samba_config:
    external: true
    name: "d38249258c4c2870a526afa1ff60410a6ef5c618649a43f795388a9cd0d69b12"

  homepage_config:
    external: true

  portainer_data:
    external: true
