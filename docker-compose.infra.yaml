# Infrastructure Stack - Traefik, Arcane, WUD, DuckDNS, Homepage, Glances, Volume Sharer
# Usage: docker compose -f docker-compose.infra.yaml up -d
# Requires .env file for: DUCKDNS_TOKEN, NOVA_DOMAIN

name: infra

networks:
  traefik_default:
    external: true
    name: "traefik_default"
  wud_default:
    external: true
    name: "wud_default"

services:

  duckdns:
    container_name: "duckdns"
    environment:
      - "SUBDOMAINS=firefly-koonan"
      - "TOKEN=${DUCKDNS_TOKEN}"
    image: "lscr.io/linuxserver/duckdns:latest"
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.infra,discord.notify"
    restart: "unless-stopped"

  homepage:
    container_name: "homepage"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    image: "ghcr.io/gethomepage/homepage:latest"
    environment:
      - "TZ=${TZ}"
      - "HOMEPAGE_ALLOWED_HOSTS=${NOVA_HOSTNAME}:3000,${NOVA_DOMAIN}:3000,home.${NOVA_DOMAIN}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.homepage.rule: "Host(`home.${NOVA_DOMAIN}`)"
      traefik.http.routers.homepage.entrypoints: "websecure"
      traefik.http.routers.homepage.tls: "true"
      traefik.http.services.homepage.loadbalancer.server.port: "3000"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.infra,discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3000:3000/tcp"
    restart: "unless-stopped"
    volumes:
      - "./homepage:/app/config"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/data1:/data1:ro"
      - "/data2:/data2:ro"
      - "/data3:/data3:ro"

  arcane:
    container_name: "arcane"
    image: "ghcr.io/getarcaneapp/arcane:latest"
    cgroup: host
    environment:
      - "ENCRYPTION_KEY=${ARCANE_ENCRYPTION_KEY}"
      - "JWT_SECRET=${ARCANE_JWT_SECRET}"
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3552/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    labels:
      traefik.enable: "true"
      traefik.http.routers.arcane.rule: "Host(`arcane.${NOVA_DOMAIN}`)"
      traefik.http.routers.arcane.entrypoints: "websecure"
      traefik.http.routers.arcane.tls: "true"
      traefik.http.services.arcane.loadbalancer.server.port: "3552"
      homepage.group: "Infrastructure"
      homepage.name: "Arcane"
      homepage.icon: "arcane.svg"
      homepage.href: "https://arcane.${NOVA_DOMAIN}"
      homepage.description: "Container Management"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3552:3552/tcp"
    restart: "unless-stopped"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "arcane_data:/app/data"

  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=traefik_default"
      - "--providers.file.filename=/etc/traefik/dynamic.yaml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=duckdns"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.disablepropagationcheck=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=60"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
      - "--ping=true"
    container_name: "traefik"
    environment:
      - "DUCKDNS_TOKEN=${DUCKDNS_TOKEN}"
      - "NOVA_DOMAIN=${NOVA_DOMAIN}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    image: "traefik:v3.6"
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik-dashboard.rule: "Host(`traefik.${NOVA_DOMAIN}`)"
      traefik.http.routers.traefik-dashboard.entrypoints: "websecure"
      traefik.http.routers.traefik-dashboard.tls: "true"
      traefik.http.routers.traefik-dashboard.tls.certresolver: "letsencrypt"
      traefik.http.routers.traefik-dashboard.tls.domains[0].main: "${NOVA_DOMAIN}"
      traefik.http.routers.traefik-dashboard.tls.domains[0].sans: "*.${NOVA_DOMAIN}"
      traefik.http.routers.traefik-dashboard.service: "api@internal"
      traefik.http.routers.root-redirect.rule: "Host(`${NOVA_DOMAIN}`)"
      traefik.http.routers.root-redirect.entrypoints: "websecure"
      traefik.http.routers.root-redirect.tls: "true"
      traefik.http.routers.root-redirect.middlewares: "root-to-homepage"
      traefik.http.routers.root-redirect.service: "noop@internal"
      traefik.http.middlewares.root-to-homepage.redirectregex.regex: "^https://${NOVA_DOMAIN}/(.*)"
      traefik.http.middlewares.root-to-homepage.redirectregex.replacement: "https://home.${NOVA_DOMAIN}/$${1}"
      traefik.http.middlewares.root-to-homepage.redirectregex.permanent: "true"
      homepage.group: "Infrastructure"
      homepage.name: "Traefik"
      homepage.icon: "traefik.svg"
      homepage.href: "http://traefik.${NOVA_DOMAIN}"
      homepage.description: "Reverse Proxy Dashboard"
      wud.watch: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    restart: "unless-stopped"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro"
      - "traefik_acme:/letsencrypt"

  glances:
    container_name: "glances"
    environment:
      - "TZ=${TZ}"
      - "GLANCES_OPT=-w"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:61208/api/4/uptime >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    image: "nicolargo/glances:latest-full"
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "Glances"
      homepage.icon: "glances.png"
      homepage.href: "https://glances.${NOVA_DOMAIN}"
      homepage.description: "System Monitoring"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.infra,discord.notify"
    network_mode: "host"
    pid: "host"
    restart: "unless-stopped"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  volume-sharer:
    container_name: "volume-sharer"
    environment:
      - "USERID=0"
      - "GROUPID=0"
    hostname: "${NOVA_HOSTNAME}"
    image: "gdiepen/volume-sharer"
    labels:
      wud.watch: "false"
    network_mode: "host"
    ports:
      - "139:139/tcp"
      - "445:445/tcp"
    restart: "unless-stopped"
    volumes:
      - "/var/lib/docker/volumes:/docker_volumes"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "volume_sharer_samba_config:/etc/samba"

  wud:
    container_name: "wud"
    environment:
      - "WUD_LOG_FORMAT=text"
      # Watcher - check for updates at 4am daily
      - "WUD_WATCHER_DOCKER_LOCAL_CRON=0 4 * * *"
      - "WUD_WATCHER_DOCKER_LOCAL_WATCHBYDEFAULT=false"
      # Docker Compose triggers - one per stack file
      - "WUD_TRIGGER_DOCKERCOMPOSE_INFRA_FILE=/compose/docker-compose.infra.yaml"
      - "WUD_TRIGGER_DOCKERCOMPOSE_INFRA_BACKUP=true"
      - "WUD_TRIGGER_DOCKERCOMPOSE_INFRA_PRUNE=true"
      - "WUD_TRIGGER_DOCKERCOMPOSE_MEDIA_FILE=/compose/docker-compose.media.yaml"
      - "WUD_TRIGGER_DOCKERCOMPOSE_MEDIA_BACKUP=true"
      - "WUD_TRIGGER_DOCKERCOMPOSE_MEDIA_PRUNE=true"
      - "WUD_TRIGGER_DOCKERCOMPOSE_BACKUP_FILE=/compose/docker-compose.backup.yaml"
      - "WUD_TRIGGER_DOCKERCOMPOSE_BACKUP_BACKUP=true"
      - "WUD_TRIGGER_DOCKERCOMPOSE_BACKUP_PRUNE=true"
      - "WUD_TRIGGER_DOCKERCOMPOSE_MOVIENIGHT_FILE=/compose/docker-compose.movienight.yaml"
      - "WUD_TRIGGER_DOCKERCOMPOSE_MOVIENIGHT_BACKUP=true"
      - "WUD_TRIGGER_DOCKERCOMPOSE_MOVIENIGHT_PRUNE=true"
      # Discord notification trigger
      - "WUD_TRIGGER_DISCORD_NOTIFY_URL=${DISCORD_WEBHOOK_URL}"
      - "WUD_TRIGGER_DISCORD_NOTIFY_ONCE=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: "getwud/wud"
    labels:
      traefik.enable: "true"
      traefik.http.routers.wud.rule: "Host(`wud.${NOVA_DOMAIN}`)"
      traefik.http.routers.wud.entrypoints: "websecure"
      traefik.http.routers.wud.tls: "true"
      traefik.http.services.wud.loadbalancer.server.port: "3000"
      homepage.group: "Infrastructure"
      homepage.name: "WUD"
      homepage.icon: "whats-up-docker.png"
      homepage.href: "http://wud.${NOVA_DOMAIN}"
      homepage.description: "Container Update Notifications"
      wud.watch: "false"
    networks:
      - "wud_default"
      - "traefik_default"
    ports:
      - "3003:3000/tcp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${NOVA_CONFIG_PATH:-.}:/compose:ro"

volumes:

  traefik_acme:
    external: true

  volume_sharer_samba_config:
    external: true
    name: "d38249258c4c2870a526afa1ff60410a6ef5c618649a43f795388a9cd0d69b12"

  arcane_data:
