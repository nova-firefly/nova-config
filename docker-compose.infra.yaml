    logging:
      driver: "json-file"
      options: {}
    networks:
      - "wud_default"
    ports:
      - "3003:3000/tcp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    working_dir: "/home/node/app"

version: "3.6"

volumes:

  d38249258c4c2870a526afa1ff60410a6ef5c618649a43f795388a9cd0d69b12:
