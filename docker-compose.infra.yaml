      com.docker.compose.project: "traefik"
      com.docker.compose.project.config_files: "/opt/stacks/traefik/compose.yaml"
      com.docker.compose.project.working_dir: "/opt/stacks/traefik"
      com.docker.compose.replace: "40753551fcf2b0164ffacd98af763fd3022ef332546fd3442aaf4204807c045f"
      com.docker.compose.service: "traefik"
      com.docker.compose.version: "2.34.0"
      org.opencontainers.image.description: "A modern reverse-proxy"
      org.opencontainers.image.documentation: "https://docs.traefik.io"
      org.opencontainers.image.source: "https://github.com/traefik/traefik"
      org.opencontainers.image.title: "Traefik"
      org.opencontainers.image.url: "https://traefik.io"
      org.opencontainers.image.vendor: "Traefik Labs"
      org.opencontainers.image.version: "v3.6.6"
    logging:
      driver: "json-file"
      options: {}
    networks:
      - "traefik_default"
    ports:
