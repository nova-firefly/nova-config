# Infrastructure Stack - Traefik, Portainer, Dockge, WUD, DuckDNS, Homepage, Volume Sharer
# Usage: docker compose -f docker-compose.infra.yaml up -d
# Requires .env file for: DUCKDNS_TOKEN

networks:
  dockge_default:
    external: true
    name: "dockge_default"
  traefik_default:
    external: true
    name: "traefik_default"
  wud_default:
    external: true
    name: "wud_default"

services:

  dockge-dockge-1:
    command:
      - "tsx"
      - "./backend/index.ts"
    container_name: "dockge-dockge-1"
    entrypoint:
      - "/usr/bin/dumb-init"
      - "--"
    environment:
      - "DOCKGE_STACKS_DIR=/opt/stacks"
      - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "NODE_VERSION=22.14.0"
      - "YARN_VERSION=1.22.22"
      - "UV_USE_IO_URING=0"
    hostname: "991d256607d3"
    image: "louislam/dockge:1"
    ipc: "private"
    labels:
      com.docker.compose.config-hash: "3f050a39e79270d9c2d6af4bb70ec1687282588958b84d68d2191911ad605707"
      com.docker.compose.container-number: "1"
      com.docker.compose.depends_on: ""
      com.docker.compose.image: "sha256:e85d511b2a8b883da8a1ac2fde39ecddacdc011734e9f89a14b7798d82d5a0d3"
      com.docker.compose.oneoff: "False"
      com.docker.compose.project: "dockge"
      com.docker.compose.project.config_files: "/opt/dockge/compose.yaml"
      com.docker.compose.project.working_dir: "/opt/dockge"
      com.docker.compose.service: "dockge"
      com.docker.compose.version: "2.35.1"
    logging:
      driver: "json-file"
      options: {}
    networks:
      - "dockge_default"
    ports:
      - "5001:5001/tcp"
    restart: "unless-stopped"
    volumes:
      - "/opt/dockge/data:/app/data"
      - "/opt/stacks:/opt/stacks"
      - "/var/run/docker.sock:/var/run/docker.sock"
    working_dir: "/app"

  duckdns:
    container_name: "duckdns"
    entrypoint:
      - "/init"
    environment:
      - "SUBDOMAINS=firefly-koonan"
      - "TOKEN=${DUCKDNS_TOKEN}"
      - "PATH=/lsiopy/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "PS1=$$(whoami)@$$(hostname):$$(pwd)\\$$ "
      - "HOME=/root"
      - "TERM=xterm"
      - "S6_CMD_WAIT_FOR_SERVICES_MAXTIME=0"
      - "S6_VERBOSITY=1"
      - "S6_STAGE2_HOOK=/docker-mods"
      - "VIRTUAL_ENV=/lsiopy"
      - "LSIO_FIRST_PARTY=true"
    hostname: "8626b7da157a"
    image: "lscr.io/linuxserver/duckdns:latest"
    ipc: "private"
    labels:
      build_version: "Linuxserver.io version:- 95e5988b-ls68 Build-date:- 2025-10-27T04:22:01+00:00"
      maintainer: "aptalca"
      org.opencontainers.image.authors: "linuxserver.io"
      org.opencontainers.image.created: "2025-10-27T04:22:01+00:00"
      org.opencontainers.image.description: "[Duckdns](https://duckdns.org/) is a free service which will\
        \ point a DNS (sub domains of duckdns.org) to an IP of your choice. The service is completely\
        \ free, and doesn't require reactivation or forum posts to maintain its existence."
      org.opencontainers.image.documentation: "https://docs.linuxserver.io/images/docker-duckdns"
      org.opencontainers.image.licenses: "GPL-3.0-only"
      org.opencontainers.image.ref.name: "1da47edc1359ef22c2c1368f598e67679fd9de26"
      org.opencontainers.image.revision: "1da47edc1359ef22c2c1368f598e67679fd9de26"
      org.opencontainers.image.source: "https://github.com/linuxserver/docker-duckdns"
      org.opencontainers.image.title: "Duckdns"
      org.opencontainers.image.url: "https://github.com/linuxserver/docker-duckdns/packages"
      org.opencontainers.image.vendor: "linuxserver.io"
      org.opencontainers.image.version: "95e5988b-ls68"
    logging:
      driver: "json-file"
      options: {}
    mac_address: "7a:ef:8b:9f:d7:98"
    network_mode: "bridge"
    restart: "unless-stopped"
    working_dir: "/"

  homepage:
    container_name: "homepage"
    image: "ghcr.io/gethomepage/homepage:latest"
    environment:
      - "PUID=1000"
      - "PGID=1000"
      - "TZ=America/Chicago"
    ports:
      - "3000:3000/tcp"
    restart: "unless-stopped"
    volumes:
      - "homepage_config:/app/config"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  portainer:
    container_name: "portainer"
    entrypoint:
      - "/portainer"
    environment:
      - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    hostname: "1bc9e6af38ae"
    image: "portainer/portainer-ce:latest"
    ipc: "private"
    labels:
