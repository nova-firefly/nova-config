    environment:
      - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "USERID=0"
      - "GROUPID=0"
    hostname: "serenity"
    image: "gdiepen/volume-sharer"
    ipc: "private"
    logging:
      driver: "json-file"
      options: {}
    network_mode: "host"
    ports:
      - "139:139/tcp"
      - "445:445/tcp"
    restart: "unless-stopped"
    volumes:
      - "/var/lib/docker/volumes:/docker_volumes"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "d38249258c4c2870a526afa1ff60410a6ef5c618649a43f795388a9cd0d69b12:/etc/samba"

  wud:
    command:
      - "node"
      - "index"
    container_name: "wud"
    entrypoint:
      - "/usr/bin/entrypoint.sh"
    environment:
      - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
