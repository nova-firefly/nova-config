# MovieNight Stack - Nova override
# Base:    movienight/docker-compose.yml  (upstream submodule, --profile production)
# This file deep-merges on top, adding nova infrastructure labels and managing
# production-only services (db, backend) absent from the upstream production profile.
#
# nova.sh automatically detects the movienight/ submodule and passes:
#   docker compose -f movienight/docker-compose.yml -f docker-compose.movienight.yaml \
#                  --profile production <cmd>
#
# Requires .env file for: NOVA_DOMAIN, MOVIENIGHT_DB_PASSWORD
# Note: movienight submodule must be initialized (git submodule update --init)
#
# Port note: upstream exposes 8080:80 on the frontend; compose merge cannot remove
# inherited ports, so 8080 remains accessible on the LAN alongside Traefik routing.

name: movienight

networks:
  traefik_default:
    external: true
    name: "traefik_default"
  movienight_internal:
    internal: true

services:

  # --- Override of upstream 'movienight' service (production-profile frontend) ---
  # Adds nova routing labels; pins the image to the correct repo.
  movienight:
    image: "ghcr.io/kjsb25/movienight:latest"
    container_name: "movienight-frontend"
    depends_on:
      movienight-backend:
        condition: service_started
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    labels:
      traefik.enable: "true"
      traefik.http.routers.movienight.rule: "Host(`movienight.${NOVA_DOMAIN}`)"
      traefik.http.routers.movienight.entrypoints: "websecure"
      traefik.http.routers.movienight.tls: "true"
      traefik.http.services.movienight.loadbalancer.server.port: "80"
      homepage.group: "Tools"
      homepage.name: "MovieNight"
      homepage.icon: "emoji-🍿"
      homepage.href: "https://movienight.${NOVA_DOMAIN}/movienight/"
      homepage.description: "Movie Suggestion App"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.movienight,discord.notify"

  # --- Nova-managed services (not present in upstream's production profile) ---

  movienight-db:
    container_name: "movienight-db"
    environment:
      - "POSTGRES_DB=movienight"
      - "POSTGRES_USER=movienight_user"
      - "POSTGRES_PASSWORD=${MOVIENIGHT_DB_PASSWORD}"
    healthcheck:
      interval: 10s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U movienight_user -d movienight"]
      timeout: 5s
    image: "postgres:15-alpine"
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.movienight,discord.notify"
    networks:
      - "movienight_internal"
    restart: "unless-stopped"
    volumes:
      - "movienight_db:/var/lib/postgresql/data"

  movienight-backend:
    build:
      # Path is relative to the first -f file (movienight/docker-compose.yml),
      # so ./backend resolves to movienight/backend/ as expected.
      context: "./backend"
      dockerfile: "Dockerfile"
    container_name: "movienight-backend"
    depends_on:
      movienight-db:
        condition: service_healthy
    environment:
      - "DB_HOST=movienight-db"
      - "DB_PORT=5432"
      - "DB_NAME=movienight"
      - "DB_USER=movienight_user"
      - "DB_PASSWORD=${MOVIENIGHT_DB_PASSWORD}"
      - "PORT=4000"
    labels:
      traefik.enable: "true"
      traefik.http.routers.movienight-api.rule: "Host(`movienight.${NOVA_DOMAIN}`) && PathPrefix(`/graphql`)"
      traefik.http.routers.movienight-api.entrypoints: "websecure"
      traefik.http.routers.movienight-api.tls: "true"
      traefik.http.services.movienight-api.loadbalancer.server.port: "4000"
      wud.watch: "false"
    networks:
      - "traefik_default"
      - "movienight_internal"
    restart: "unless-stopped"

volumes:

  movienight_db:
    external: true
