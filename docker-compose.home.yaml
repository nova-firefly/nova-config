# Home Automation Stack - Home Assistant, Z-Wave, Music Assistant
# Usage: docker compose -f docker-compose.home.yaml up -d
# Requires .env file for: ZWAVE_SESSION_SECRET, NOVA_DOMAIN

name: home

networks:
  traefik_default:
    external: true
    name: "traefik_default"

services:

  homeassistant:
    container_name: "homeassistant"
    environment:
      - "TZ=${TZ}"
    hostname: "${NOVA_HOSTNAME}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8123/manifest.json >/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    image: "ghcr.io/home-assistant/home-assistant:stable"
    labels:
      homepage.group: "Home Automation"
      homepage.name: "Home Assistant"
      homepage.icon: "home-assistant.svg"
      homepage.href: "https://ha.${NOVA_DOMAIN}"
      homepage.description: "Smart Home Control"
      wud.watch: "true"
      wud.trigger.include: "discord.notify"
    network_mode: "host"
    privileged: true
    restart: "unless-stopped"
    security_opt:
      - "label=disable"
    volumes:
      - "ha_config:/config"
      - "/run/dbus:/run/dbus:ro"

  matter-server:
    container_name: "matter-server"
    environment:
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',5580)); s.close()\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: "ghcr.io/home-assistant-libs/python-matter-server:stable"
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    network_mode: "host"
    restart: "unless-stopped"
    security_opt:
      - "apparmor:unconfined"
    volumes:
      - "matter_server_data:/data"
      - "/run/dbus:/run/dbus:ro"

  music-assistant-server:
    container_name: "music-assistant-server"
    environment:
      - "LOG_LEVEL=info"
    hostname: "${NOVA_HOSTNAME}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8095)); s.close()\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: "ghcr.io/music-assistant/server:latest"
    labels:
      homepage.group: "Home Automation"
      homepage.name: "Music Assistant"
      homepage.href: "https://ma.${NOVA_DOMAIN}"
      homepage.icon: "music-assistant.svg"
      homepage.description: "Music Player"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    network_mode: "host"
    restart: "unless-stopped"
    security_opt:
      - "apparmor:unconfined"
    volumes:
      - "/home/koonan/docker/music-assistant-server/data:/data"

  zwave-js-ui:
    container_name: "zwave-js-ui"
    devices:
      - "/dev/serial/by-id/usb-Zooz_800_Z-Wave_Stick_533D004242-if00:/dev/zwave"
    environment:
      - "ZWAVEJS_EXTERNAL_CONFIG=/usr/src/app/store/.config-db"
      - "TZ=${TZ}"
      - "SESSION_SECRET=${ZWAVE_SESSION_SECRET}"
      - "NODE_ENV=production"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: "zwavejs/zwave-js-ui:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.zwave.rule: "Host(`zwave.${NOVA_DOMAIN}`)"
      traefik.http.routers.zwave.entrypoints: "websecure"
      traefik.http.routers.zwave.tls: "true"
      traefik.http.routers.zwave.middlewares: "authelia@file"
      traefik.http.services.zwave.loadbalancer.server.port: "8091"
      homepage.group: "Home Automation"
      homepage.name: "Z-Wave JS UI"
      homepage.icon: "z-wave-js-ui.png"
      homepage.href: "http://zwave.${NOVA_DOMAIN}"
      homepage.description: "Z-Wave Device Management"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3010:3000"
    restart: "always"
    tty: true
    volumes:
      - "zwave-js-ui:/usr/src/app/store"

volumes:

  ha_config:
    external: true

  zwave-js-ui:
    external: true

  matter_server_data:
    external: true
