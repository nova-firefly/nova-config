# Tools Stack - Stirling PDF, Vikunja, Actual, ntfy, Uptime Kuma, SnapOtter
# Usage: ./nova.sh up tools   (or: docker compose -f tools/compose.yaml up -d)
# Requires .env file for: NOVA_DOMAIN, TZ

name: tools

networks:
  traefik_default:
    external: true
    name: "traefik_default"

services:

  stirling-pdf:
    container_name: "stirling-pdf"
    environment:
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:8080/api/v1/info >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      # JVM cold start under Sablier wake can push past 30s. Give the healthcheck
      # room so a fresh spin-up doesn't briefly surface as unhealthy.
      start_period: 60s
    image: "stirlingtools/stirling-pdf:latest"
    labels:
      traefik.enable: "true"
      traefik.docker.allownonrunning: "true"
      traefik.http.routers.stirling-pdf.rule: "Host(`stirling-pdf.${NOVA_DOMAIN}`)"
      traefik.http.routers.stirling-pdf.entrypoints: "websecure"
      traefik.http.routers.stirling-pdf.tls: "true"
      traefik.http.routers.stirling-pdf.middlewares: "authelia@file,sablier-stirling-pdf@file"
      traefik.http.services.stirling-pdf.loadbalancer.server.port: "8080"
      sablier.enable: "true"
      sablier.group: "stirling-pdf"
      homepage.group: "Tools"
      homepage.name: "Stirling PDF"
      homepage.icon: "stirling-pdf.svg"
      homepage.href: "http://stirling-pdf.${NOVA_DOMAIN}"
      homepage.description: "PDF Manipulation — on-demand · click to wake"
      homepage.statusStyle: "dot"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "8080:8080/tcp"
    restart: "unless-stopped"
    volumes:
      - "stirling_config:/configs"

  vikunja:
    healthcheck:
      disable: true  # distroless image has no shell, wget, or curl; app health confirmed via logs
    image: vikunja/vikunja:latest
    container_name: vikunja
    environment:
      VIKUNJA_SERVICE_PUBLICURL: "https://vikunja.${NOVA_DOMAIN}"
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_TOKEN}
      VIKUNJA_DATABASE_PATH: /db/vikunja.db
    networks:
      - "traefik_default"
    volumes:
      - vikunja_files:/app/vikunja/files
      - vikunja_db:/db
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.docker.allownonrunning: "true"
      traefik.http.routers.vikunja.rule: "Host(`vikunja.${NOVA_DOMAIN}`)"
      traefik.http.routers.vikunja.entrypoints: "websecure"
      traefik.http.routers.vikunja.tls: "true"
      traefik.http.routers.vikunja.middlewares: "authelia@file,sablier-vikunja@file"
      traefik.http.services.vikunja.loadbalancer.server.port: "3456"
      sablier.enable: "true"
      sablier.group: "vikunja"
      homepage.group: "Tools"
      homepage.name: "Vikunja"
      homepage.icon: "vikunja.svg"
      homepage.href: "http://vikunja.${NOVA_DOMAIN}"
      homepage.description: "Task Management — on-demand · click to wake"
      homepage.statusStyle: "dot"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"

  actual:
    container_name: "actual"
    healthcheck:
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    image: "actualbudget/actual-server:latest"
    labels:
      traefik.enable: "true"
      traefik.docker.allownonrunning: "true"
      traefik.http.routers.actual.rule: "Host(`actual.${NOVA_DOMAIN}`)"
      traefik.http.routers.actual.entrypoints: "websecure"
      traefik.http.routers.actual.tls: "true"
      traefik.http.routers.actual.middlewares: "authelia@file,sablier-actual@file"
      traefik.http.services.actual.loadbalancer.server.port: "5006"
      sablier.enable: "true"
      sablier.group: "actual"
      homepage.group: "Tools"
      homepage.name: "Actual Budget"
      homepage.icon: "actual-budget.svg"
      homepage.href: "https://actual.${NOVA_DOMAIN}"
      homepage.description: "Budgeting — on-demand · click to wake"
      homepage.statusStyle: "dot"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    volumes:
      - "actual_data:/data"

  # MCP server that exposes Actual Budget over SSE for LLM clients
  # (Claude Desktop/web, Codex, etc.). Talks to `actual` on the internal
  # traefik_default network via ACTUAL_SERVER_URL=http://actual:5006.
  #
  # Sablier: shares `sablier.group: actual` and reuses the sablier-actual@file
  # middleware so a hit on either host wakes BOTH containers together — the
  # MCP server can't reach the Actual API if `actual` itself is asleep.
  # Same pattern as sablier-movienight-test (frontend+backend must wake together).
  #
  # Auth: no Authelia — MCP clients don't do browser forward-auth. The
  # --enable-bearer flag makes the server require Authorization: Bearer $BEARER_TOKEN
  # on every request, which is what MCP clients send.
  actual-mcp:
    container_name: "actual-mcp"
    image: "sstefanov/actual-mcp:latest"
    command:
      - "--sse"
      - "--enable-write"
      - "--enable-bearer"
    environment:
      - "ACTUAL_SERVER_URL=http://actual:5006"
      - "ACTUAL_PASSWORD=${ACTUAL_PASSWORD}"
      - "ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}"
      - "BEARER_TOKEN=${ACTUAL_MCP_BEARER_TOKEN}"
    labels:
      traefik.enable: "true"
      traefik.docker.allownonrunning: "true"
      traefik.http.routers.actual-mcp.rule: "Host(`actual-mcp.${NOVA_DOMAIN}`)"
      traefik.http.routers.actual-mcp.entrypoints: "websecure"
      traefik.http.routers.actual-mcp.tls: "true"
      traefik.http.routers.actual-mcp.middlewares: "sablier-actual@file"
      traefik.http.services.actual-mcp.loadbalancer.server.port: "3000"
      sablier.enable: "true"
      sablier.group: "actual"
      homepage.group: "Tools"
      homepage.name: "Actual MCP"
      homepage.icon: "actual-budget.svg"
      homepage.href: "https://actual-mcp.${NOVA_DOMAIN}"
      homepage.description: "Actual Budget MCP — on-demand · wakes with Actual"
      homepage.statusStyle: "dot"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    volumes:
      - "actual_mcp_data:/data"

  ntfy:
    container_name: "ntfy"
    command: serve
    environment:
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    image: "binwiederhier/ntfy:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.ntfy.rule: "Host(`ntfy.${NOVA_DOMAIN}`)"
      traefik.http.routers.ntfy.entrypoints: "websecure"
      traefik.http.routers.ntfy.tls: "true"
      traefik.http.services.ntfy.loadbalancer.server.port: "80"
      # No Authelia middleware — ntfy must be reachable by webhooks from Uptime-Kuma, Backrest, etc.
      homepage.group: "Infrastructure"
      homepage.name: "ntfy"
      homepage.icon: "ntfy.svg"
      homepage.href: "https://ntfy.${NOVA_DOMAIN}"
      homepage.description: "Push Notifications"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    volumes:
      - "ntfy_data:/var/cache/ntfy"

  snapotter:
    container_name: "snapotter"
    environment:
      - "TZ=${TZ}"
      - "AUTH_ENABLED=true"
      - "DEFAULT_USERNAME=admin"
      - "DEFAULT_PASSWORD=admin"
      - "TRUST_PROXY=true"
      - "EXTERNAL_URL=https://snapotter.${NOVA_DOMAIN}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1349/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    image: "ghcr.io/snapotter-hq/snapotter:latest"
    labels:
      traefik.enable: "true"
      # On-demand: sablier@file middleware wakes this container when hit and stops
      # it after 60m idle. `allownonrunning` tells Traefik to keep the router
      # registered while the container is stopped so the wake path works.
      # Middleware order matters: Authelia must run BEFORE Sablier so unauth'd
      # probes don't wake the container.
      traefik.docker.allownonrunning: "true"
      traefik.http.routers.snapotter.rule: "Host(`snapotter.${NOVA_DOMAIN}`)"
      traefik.http.routers.snapotter.entrypoints: "websecure"
      traefik.http.routers.snapotter.tls: "true"
      traefik.http.routers.snapotter.middlewares: "authelia@file,sablier-snapotter@file"
      traefik.http.services.snapotter.loadbalancer.server.port: "1349"
      sablier.enable: "true"
      sablier.group: "snapotter"
      homepage.group: "Tools"
      homepage.name: "SnapOtter"
      homepage.icon: "mdi-image-edit"
      homepage.href: "https://snapotter.${NOVA_DOMAIN}"
      homepage.description: "Image manipulation — on-demand · click to wake"
      # Green dot = running, red dot = sleeping (Sablier stopped it). See
      # patterns.md "On-Demand Container Spin-Up (Sablier)".
      homepage.statusStyle: "dot"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    shm_size: "2gb"
    volumes:
      - "snapotter_data:/data"
      - "snapotter_workspace:/tmp/workspace"

  # Browser terminal -> host sshd. Auth layers:
  #   1. Traefik TLS at the edge
  #   2. Authelia 2FA (default policy is two_factor; inherited by `shell.` subdomain)
  #   3. host sshd (password / key / PAM-TOTP — whatever sshd is configured for)
  # No SSH credentials are stored in the image: ttyd spawns `ssh` and the user
  # types their host secret in the browser. A ttyd CVE alone yields no host access.
  # Built locally (./shell/Dockerfile) because we want a fresh ttyd base — the
  # upstream wettyoss/wetty image hasn't been rebuilt since 2022.
  shell:
    container_name: "shell"
    build:
      context: "../shell"
    command:
      - "ttyd"
      - "--writable"
      - "--port=7681"
      - "--max-clients=2"
      - "--check-origin"
      - "ssh"
      - "-o"
      - "StrictHostKeyChecking=accept-new"
      - "-o"
      - "UserKnownHostsFile=/tmp/known_hosts"
      - "-t"
      - "${SHELL_SSH_USER:?set SHELL_SSH_USER in .env to your host username}@host.docker.internal"
    environment:
      - "HOME=/tmp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Use 127.0.0.1 (not localhost): ttyd/libwebsockets is built with IPv6 off
      # and binds v4 only, but busybox wget resolves localhost to ::1 first and
      # gets ECONNREFUSED without falling back to v4.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:7681/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "true"
      traefik.http.routers.shell.rule: "Host(`shell.${NOVA_DOMAIN}`)"
      traefik.http.routers.shell.entrypoints: "websecure"
      traefik.http.routers.shell.tls: "true"
      traefik.http.routers.shell.middlewares: "authelia@file"
      traefik.http.services.shell.loadbalancer.server.port: "7681"
      homepage.group: "Infrastructure"
      homepage.name: "Shell"
      homepage.icon: "mdi-console-line"
      homepage.href: "https://shell.${NOVA_DOMAIN}"
      homepage.description: "Browser terminal (Authelia + sshd)"
      wud.watch: "false"  # locally-built image; rebuild via `./nova.sh recreate tools shell`
    mem_limit: "128m"
    networks:
      - "traefik_default"
    pids_limit: 200
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - "ALL"
    read_only: true
    tmpfs:
      - "/tmp:size=16m,mode=1777"
    user: "nobody"
    restart: "unless-stopped"

  uptime-kuma:
    container_name: "uptime-kuma"
    environment:
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: "louislam/uptime-kuma:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.uptime-kuma.rule: "Host(`status.${NOVA_DOMAIN}`)"
      traefik.http.routers.uptime-kuma.entrypoints: "websecure"
      traefik.http.routers.uptime-kuma.tls: "true"
      traefik.http.routers.uptime-kuma.middlewares: "authelia@file"
      traefik.http.services.uptime-kuma.loadbalancer.server.port: "3001"
      homepage.group: "Infrastructure"
      homepage.name: "Uptime Kuma"
      homepage.icon: "uptime-kuma.svg"
      homepage.href: "https://status.${NOVA_DOMAIN}"
      homepage.description: "Service Uptime Monitoring"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3002:3001/tcp"
    restart: "unless-stopped"
    volumes:
      - "uptime_kuma_data:/app/data"

volumes:

  uptime_kuma_data:
    external: true

  vikunja_db:
    external: true

  vikunja_files:
    external: true

  ntfy_data:
    external: true

  actual_data: {}

  actual_mcp_data: {}

  stirling_config:
    external: true

  snapotter_data:
    external: true

  snapotter_workspace: {}
