# Tools Stack - Stirling PDF, Vikunja, Actual, ntfy, Uptime Kuma, Habitica, SnapOtter
# Usage: ./nova.sh up tools   (or: docker compose -f tools/compose.yaml up -d)
# Requires .env file for: NOVA_DOMAIN, TZ, ACME_EMAIL (Habitica admin)

name: tools

networks:
  traefik_default:
    external: true
    name: "traefik_default"
  habitica_internal:
    internal: true

services:

  stirling-pdf:
    container_name: "stirling-pdf"
    environment:
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:8080/api/v1/info >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    image: "stirlingtools/stirling-pdf:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.stirling-pdf.rule: "Host(`stirling-pdf.${NOVA_DOMAIN}`)"
      traefik.http.routers.stirling-pdf.entrypoints: "websecure"
      traefik.http.routers.stirling-pdf.tls: "true"
      traefik.http.routers.stirling-pdf.middlewares: "authelia@file"
      traefik.http.services.stirling-pdf.loadbalancer.server.port: "8080"
      homepage.group: "Tools"
      homepage.name: "Stirling PDF"
      homepage.icon: "stirling-pdf.svg"
      homepage.href: "http://stirling-pdf.${NOVA_DOMAIN}"
      homepage.description: "PDF Manipulation"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "8080:8080/tcp"
    restart: "unless-stopped"
    volumes:
      - "stirling_config:/configs"

  vikunja:
    healthcheck:
      disable: true  # distroless image has no shell, wget, or curl; app health confirmed via logs
    image: vikunja/vikunja:latest
    container_name: vikunja
    environment:
      VIKUNJA_SERVICE_PUBLICURL: "https://vikunja.${NOVA_DOMAIN}"
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_TOKEN}
      VIKUNJA_DATABASE_PATH: /db/vikunja.db
    networks:
      - "traefik_default"
    volumes:
      - vikunja_files:/app/vikunja/files
      - vikunja_db:/db
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.vikunja.rule: "Host(`vikunja.${NOVA_DOMAIN}`)"
      traefik.http.routers.vikunja.entrypoints: "websecure"
      traefik.http.routers.vikunja.tls: "true"
      traefik.http.routers.vikunja.middlewares: "authelia@file"
      traefik.http.services.vikunja.loadbalancer.server.port: "3456"
      homepage.group: "Tools"
      homepage.name: "Vikunja"
      homepage.icon: "vikunja.svg"
      homepage.href: "http://vikunja.${NOVA_DOMAIN}"
      homepage.description: "Task Management"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"

  actual:
    container_name: "actual"
    healthcheck:
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    image: "actualbudget/actual-server:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.actual.rule: "Host(`actual.${NOVA_DOMAIN}`)"
      traefik.http.routers.actual.entrypoints: "websecure"
      traefik.http.routers.actual.tls: "true"
      traefik.http.routers.actual.middlewares: "authelia@file"
      traefik.http.services.actual.loadbalancer.server.port: "5006"
      homepage.group: "Tools"
      homepage.name: "Actual Budget"
      homepage.icon: "actual-budget.svg"
      homepage.href: "https://actual.${NOVA_DOMAIN}"
      homepage.description: "Budgeting"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    volumes:
      - "actual_data:/data"

  ntfy:
    container_name: "ntfy"
    command: serve
    environment:
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    image: "binwiederhier/ntfy:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.ntfy.rule: "Host(`ntfy.${NOVA_DOMAIN}`)"
      traefik.http.routers.ntfy.entrypoints: "websecure"
      traefik.http.routers.ntfy.tls: "true"
      traefik.http.services.ntfy.loadbalancer.server.port: "80"
      # No Authelia middleware — ntfy must be reachable by webhooks from Uptime-Kuma, Backrest, etc.
      homepage.group: "Infrastructure"
      homepage.name: "ntfy"
      homepage.icon: "ntfy.svg"
      homepage.href: "https://ntfy.${NOVA_DOMAIN}"
      homepage.description: "Push Notifications"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    volumes:
      - "ntfy_data:/var/cache/ntfy"

  habitica:
    container_name: "habitica"
    depends_on:
      habitica-db:
        condition: service_healthy
    environment:
      - "BASE_URL=https://habitica.${NOVA_DOMAIN}"
      - "NODE_DB_URI=mongodb://habitica-db:27017/habitica"
      - "ADMIN_EMAIL=${ACME_EMAIL}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    image: "awinterstein/habitica:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.habitica.rule: "Host(`habitica.${NOVA_DOMAIN}`)"
      traefik.http.routers.habitica.entrypoints: "websecure"
      traefik.http.routers.habitica.tls: "true"
      traefik.http.routers.habitica.middlewares: "authelia@file"
      traefik.http.services.habitica.loadbalancer.server.port: "3000"
      homepage.group: "Tools"
      homepage.name: "Habitica"
      homepage.icon: "habitica.svg"
      homepage.href: "https://habitica.${NOVA_DOMAIN}"
      homepage.description: "Gamified Habit Tracker"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
      - "habitica_internal"
    restart: "unless-stopped"

  habitica-db:
    container_name: "habitica-db"
    image: "mongo:5.0"
    command: ["--quiet", "--logpath", "/dev/null"]
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      # Pinned major (mongo 5.0) — Habitica's schema migrations are tied to specific Mongo
      # versions; do not let WUD auto-bump. Notify on digest changes within 5.0 only.
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.tag.include: "^5\\.0(\\..*)?$"
      wud.trigger.include: "discord.notify"
    networks:
      - "habitica_internal"
    restart: "unless-stopped"
    volumes:
      - "habitica_db:/data/db"

  snapotter:
    container_name: "snapotter"
    environment:
      - "TZ=${TZ}"
      - "AUTH_ENABLED=true"
      - "DEFAULT_USERNAME=admin"
      - "DEFAULT_PASSWORD=admin"
      - "TRUST_PROXY=true"
      - "EXTERNAL_URL=https://snapotter.${NOVA_DOMAIN}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1349/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    image: "ghcr.io/snapotter-hq/snapotter:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.snapotter.rule: "Host(`snapotter.${NOVA_DOMAIN}`)"
      traefik.http.routers.snapotter.entrypoints: "websecure"
      traefik.http.routers.snapotter.tls: "true"
      traefik.http.routers.snapotter.middlewares: "authelia@file"
      traefik.http.services.snapotter.loadbalancer.server.port: "1349"
      homepage.group: "Tools"
      homepage.name: "SnapOtter"
      homepage.icon: "mdi-image-edit"
      homepage.href: "https://snapotter.${NOVA_DOMAIN}"
      homepage.description: "Self-hosted image manipulation"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    restart: "unless-stopped"
    shm_size: "2gb"
    volumes:
      - "snapotter_data:/data"
      - "snapotter_workspace:/tmp/workspace"

  uptime-kuma:
    container_name: "uptime-kuma"
    environment:
      - "TZ=${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: "louislam/uptime-kuma:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.uptime-kuma.rule: "Host(`status.${NOVA_DOMAIN}`)"
      traefik.http.routers.uptime-kuma.entrypoints: "websecure"
      traefik.http.routers.uptime-kuma.tls: "true"
      traefik.http.routers.uptime-kuma.middlewares: "authelia@file"
      traefik.http.services.uptime-kuma.loadbalancer.server.port: "3001"
      homepage.group: "Infrastructure"
      homepage.name: "Uptime Kuma"
      homepage.icon: "uptime-kuma.svg"
      homepage.href: "https://status.${NOVA_DOMAIN}"
      homepage.description: "Service Uptime Monitoring"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "3002:3001/tcp"
    restart: "unless-stopped"
    volumes:
      - "uptime_kuma_data:/app/data"

volumes:

  uptime_kuma_data:
    external: true

  vikunja_db:
    external: true

  vikunja_files:
    external: true

  ntfy_data:
    external: true

  actual_data: {}

  habitica_db:
    external: true

  stirling_config:
    external: true

  snapotter_data:
    external: true

  snapotter_workspace: {}
