## MovieNight Collection
## Generated by the MovieNight admin panel → Admin → Kometa Export.
## To update: download the file from the admin panel and replace this file.
## Docs: https://kometa.wiki/en/latest/files/builders/tmdb/standard/movie/

collections:

  MovieNight Watchlist:
    tmdb_movie:
      # Replace with TMDB IDs exported from the MovieNight admin panel
      - 0
    collection_order: custom
    sync_mode: sync
    radarr_add_missing: true
    radarr_search: true
    visible_home: true
    visible_shared: true
    summary: "MovieNight watchlist — export from MovieNight admin panel to update."
