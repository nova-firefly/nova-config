## Letterboxd Collections
## Docs: https://kometa.wiki/en/latest/files/builders/letterboxd/

collections:

  Bailey + Keenan:
    # Letterboxd list: https://boxd.it/T91IC → resolved full URL required by Kometa
    letterboxd_list: https://letterboxd.com/qwerty997/list/bk/
    # Preserve the exact order from the Letterboxd list in Plex
    collection_order: custom
    # Add movies from the list that aren't in Plex to Radarr for downloading
    radarr_add_missing: true
    # Trigger a search in Radarr immediately after adding
    radarr_search: true
    # Show in Plex home and on the shared Plex home
    visible_home: true
    visible_shared: true
    summary: "Ordered list for Bailey and Keenan's movie nights. Updated regularly with new picks!"
