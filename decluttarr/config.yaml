# Decluttarr Configuration
# Marks stalled/slow downloads as failed after sustained inactivity or low speed.
#
# remove_stalled strategy: timer=30min * max_strikes=48 = 1,440min = 24 hours
# A download must be caught stalled on 48 consecutive checks (each 30min apart)
# before it is marked as failed. Any progress resets the counter.
#
# remove_slow strategy: timer=30min * max_strikes=10 = 300min = 5 hours
# A download must be below min_speed on 10 consecutive checks before removal.
# Note: uses arr-reported speed (Transmission/nzbget lack direct API support).

general:
  log_level: DEBUG
  test_run: false
  # Check queues every 30 minutes
  timer: 30
  ssl_verification: true

instances:
  sonarr:
    - base_url: "http://sonarr:8989"
      api_key: !ENV SONARR_API_KEY
  radarr:
    - base_url: "http://radarr:7878"
      api_key: !ENV RADARR_API_KEY

jobs:
  # Mark stalled downloads (no peer connections / no progress) as failed
  # after 48 strikes × 30min = 24 hours of inactivity
  remove_stalled:
    max_strikes: 48

  # Remove downloads that stay below min_speed KB/s for 10 consecutive checks
  # (10 × 30min = 5 hours). Adjust min_speed to match your connection.
  remove_slow:
    min_speed: 100
    max_strikes: 10

  # Also clean up items already marked as failed in the *arr queue
  remove_failed_downloads: true

  # Disable detect_deletions — media volumes are not mounted in this container
  detect_deletions: false
