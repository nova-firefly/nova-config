# Decluttarr Configuration
# Cleans up stalled, slow, failed, and unimportable downloads automatically.
#
# Global default: max_strikes=3 (3 × 10min = 30min grace period)
# Override per-job where a longer window is warranted (e.g. remove_stalled).
#
# remove_stalled strategy: timer=10min * max_strikes=24 = 4 hours
# remove_slow strategy:    timer=10min * max_strikes=10 = ~100 minutes
# all others:              timer=10min * max_strikes=3  = 30 minutes

general:
  log_level: VERBOSE
  test_run: false
  # Check queues every 10 minutes
  timer: 10
  ssl_verification: true

# Global defaults — individual jobs override these as needed
job_defaults:
  max_strikes: 3

instances:
  sonarr:
    - base_url: "http://sonarr:8989"
      api_key: !ENV SONARR_API_KEY
  radarr:
    - base_url: "http://radarr:7878"
      api_key: !ENV RADARR_API_KEY

# Download clients — separate from arr instances.
# Enables real-time speed data for remove_slow.
# 'name' must match exactly what Sonarr/Radarr call this download client.
download_clients:
  qbittorrent:
    - base_url: "http://gluetun:8090"
      username: !ENV QBITTORRENT_USER
      password: !ENV QBITTORRENT_PASS
      name: "qBittorrent"

jobs:
  # Mark stalled downloads (no peer connections / no progress) as failed
  # after 24 strikes × 10min = 4 hours. Any progress resets the counter.
  remove_stalled:
    max_strikes: 24

  # Remove downloads that stay below min_speed KB/s for 10 consecutive checks
  # (10 × 10min = ~100 minutes). Adjust min_speed to match your connection.
  # qBittorrent is configured as an instance above for real-time speed data.
  remove_slow:
    min_speed: 500
    max_strikes: 10

  # Remove items already marked as failed in the *arr queue
  remove_failed_downloads: true

  # Remove completed downloads that repeatedly fail to import (e.g. fake
  # releases disguised as .exe, corrupted files, wrong format). Uses global
  # max_strikes (3 × 10min = 30 min) before giving up and removing.
  remove_failed_imports: true

  # Remove queue items whose source file no longer exists on disk — handles
  # cases where the download client already cleaned up the file but *arr
  # still shows the item as stuck.
  remove_missing_files: true

  # Remove downloads containing only non-media files (e.g. .exe, .nfo-only,
  # password-protected archives) that can never be imported.
  remove_bad_files: true

  # Disable detect_deletions — media volumes are not mounted in this container
  detect_deletions: false
