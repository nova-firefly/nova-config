# Backup Stack - Backrest and Duplicati
# Usage: docker compose -f docker-compose.backup.yaml up -d
# Requires .env file for: DUPLICATI_SETTINGS_ENCRYPTION_KEY, NOVA_DOMAIN

name: backup

networks:
  backrest_default:
    external: true
    name: "backrest_default"
  traefik_default:
    external: true
    name: "traefik_default"

services:

  backrest:
    container_name: "backrest"
    environment:
      - "TZ=${TZ}"
      - "XDG_CACHE_HOME=/cache"
      - "BACKREST_DATA=/data"
      - "BACKREST_CONFIG=/config/config.json"
    hostname: "backrest"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9898/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: "garethgeorge/backrest:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.backrest.rule: "Host(`backrest.${NOVA_DOMAIN}`)"
      traefik.http.routers.backrest.entrypoints: "websecure"
      traefik.http.routers.backrest.tls: "true"
      traefik.http.services.backrest.loadbalancer.server.port: "9898"
      homepage.group: "Infrastructure"
      homepage.name: "Backrest"
      homepage.icon: "backrest.png"
      homepage.href: "http://backrest.${NOVA_DOMAIN}"
      homepage.description: "Backup Management"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.backup,discord.notify"
    networks:
      - "backrest_default"
      - "traefik_default"
    ports:
      - "9898:9898/tcp"
    restart: "unless-stopped"
    volumes:
      - "/data1:/hd1:ro"
      - "/data2:/hd2:ro"
      - "/data3:/hd3:ro"
      - "${NOVA_USER_HOME}:/home:ro"
      - "/var/lib/docker/volumes:/volumes:ro"
      # nova-config bind-mount directories (homepage, kometa, traefik, decluttarr)
      # are not inside Docker volumes so they need an explicit mount for backup.
      - "${NOVA_CONFIG_PATH:-.}:/nova-config:ro"
      - "backrest_backrest_cache:/cache"
      - "backrest_backrest_config:/config"
      - "backrest_backrest_data:/data"

volumes:

  backrest_backrest_cache:
    external: true

  backrest_backrest_config:
    external: true

  backrest_backrest_data:
    external: true
