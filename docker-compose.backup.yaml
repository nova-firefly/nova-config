# Backup Stack - Backrest with SFTP remote
# Usage: docker compose -f docker-compose.backup.yaml up -d
# Requires .env file for: SFTP_HOST, SFTP_USER, SFTP_PORT, SFTP_PATH,
#                         UPLOAD_LOCATION, DB_DATA_LOCATION, DB_USERNAME, DB_DATABASE_NAME,
#                         NOVA_DOMAIN, NOVA_TRAEFIK_SUFFIX
#
# SSH key setup (one-time, before first run):
#   ssh-keygen -t ed25519 -f ./backrest/ssh/id_ed25519 -N "" -C "backrest@nova"
#   # Then add the public key to ~/.ssh/authorized_keys on your SFTP server

networks:
  backrest_default:
    external: true
    name: "backrest_default"
  traefik_default:
    external: true
    name: "traefik_default"

services:

  backrest:
    container_name: "backrest"
    environment:
      - "TZ=${TZ}"
      - "XDG_CACHE_HOME=/cache"
      - "BACKREST_DATA=/data"
      - "BACKREST_CONFIG=/config/config.json"
    hostname: "backrest"
    image: "garethgeorge/backrest:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.backrest.rule: "Host(`backrest${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.backrest.entrypoints: "websecure"
      traefik.http.routers.backrest.tls: "true"
      traefik.http.services.backrest.loadbalancer.server.port: "9898"
      homepage.group: "Infrastructure"
      homepage.name: "Backrest"
      homepage.icon: "backrest.png"
      homepage.href: "http://backrest${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}"
      homepage.description: "Backup Management"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.backup,discord.notify"
    networks:
      - "backrest_default"
      - "traefik_default"
    ports:
      - "9898:9898/tcp"
    restart: "unless-stopped"
    volumes:
      - "/data1:/hd1:ro"
      - "/data2:/hd2:ro"
      - "/data3:/hd3:ro"
      - "/home/koonan:/home:ro"
      - "/var/lib/docker/volumes:/volumes:ro"
      # Plex config (the irreplaceable part - not media files)
      - "/data1/plex_config/plex_config/_data:/backup/plex-config:ro"
      # Immich photo library and postgres data
      - "${UPLOAD_LOCATION}:/backup/immich-photos:ro"
      - "${DB_DATA_LOCATION}:/backup/immich-db:ro"
      # Immich postgres dump output (written by backup-runner, read by backrest)
      - "backrest_immich_dump:/backup/immich-db-dump"
      # SSH key for SFTP remote
      - "./backrest/ssh:/root/.ssh:ro"
      - "backrest_backrest_cache:/cache"
      - "backrest_backrest_config:/config"
      - "backrest_backrest_data:/data"

  backup-runner:
    container_name: "backup-runner"
    build:
      context: "./backup-runner"
    environment:
      - "TZ=${TZ}"
      - "SFTP_HOST=${SFTP_HOST}"
      - "SFTP_PORT=${SFTP_PORT:-22}"
      - "BACKREST_URL=http://backrest:9898"
      - "DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}"
    networks:
      - "backrest_default"
    restart: "unless-stopped"
    volumes:
      # Needs docker socket to run pg_dumpall inside the immich_postgres container
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # Dump output directory shared with backrest
      - "backrest_immich_dump:/immich-db-dump"
      # SSH key for connectivity test
      - "./backrest/ssh:/root/.ssh:ro"

volumes:

  backrest_backrest_cache:
    external: true

  backrest_backrest_config:
    external: true

  backrest_backrest_data:
    external: true

  backrest_immich_dump:
    external: true
