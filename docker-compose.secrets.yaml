# Secrets Stack - 1Password Connect Server
# Usage: docker compose -f docker-compose.secrets.yaml up -d
# Requires: ./1password-credentials.json (download from 1password.com → Integrations → Connect)
# Requires .env for: OP_CONNECT_TOKEN (bootstrap key - stays in .env permanently)
# See context/stacks.md for full setup instructions

name: secrets

services:

  op-connect-api:
    container_name: "op-connect-api"
    image: "1password/connect-api:latest"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/heartbeat >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      # Bind to localhost only — only the op CLI on the host needs this.
      # Not exposed publicly via Traefik; no web UI.
      - "127.0.0.1:8080:8080/tcp"
    restart: "unless-stopped"
    volumes:
      - "./1password-credentials.json:/home/opuser/.op/1password-credentials.json:ro"
      - "op_connect_data:/home/opuser/.op/data"
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.secrets,discord.notify"

  op-connect-sync:
    container_name: "op-connect-sync"
    image: "1password/connect-sync:latest"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/heartbeat >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: "unless-stopped"
    volumes:
      - "./1password-credentials.json:/home/opuser/.op/1password-credentials.json:ro"
      - "op_connect_data:/home/opuser/.op/data"
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.secrets,discord.notify"

volumes:

  op_connect_data:
    external: true
