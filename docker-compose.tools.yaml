# Tools Stack - Stirling PDF
# Usage: docker compose -f docker-compose.tools.yaml up -d
# Requires .env file for: NOVA_DOMAIN, NOVA_TRAEFIK_SUFFIX

networks:
  traefik_default:
    external: true
    name: "traefik_default"

services:

  stirling-pdf:
    container_name: "stirling-pdf"
    environment:
      - "TZ=${TZ}"
    image: "stirlingtools/stirling-pdf:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.stirling-pdf.rule: "Host(`stirling-pdf${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}`)"
      traefik.http.routers.stirling-pdf.entrypoints: "websecure"
      traefik.http.routers.stirling-pdf.tls: "true"
      traefik.http.services.stirling-pdf.loadbalancer.server.port: "8080"
      homepage.group: "Tools"
      homepage.name: "Stirling PDF"
      homepage.icon: "stirling-pdf.svg"
      homepage.href: "http://stirling-pdf${NOVA_TRAEFIK_SUFFIX}.${NOVA_DOMAIN}"
      homepage.description: "PDF Manipulation"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.trigger.include: "dockercompose.tools,discord.notify"
    networks:
      - "traefik_default"
    ports:
      - "8080:8080/tcp"
    restart: "unless-stopped"
    volumes:
      - "stirling-pdf_configs:/configs"

volumes:

  stirling-pdf_configs:
    external: true
