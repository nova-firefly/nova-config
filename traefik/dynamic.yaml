# Traefik File Provider - Production
# Routes for services using network_mode: host
# These cannot be discovered by Traefik's Docker provider
# host.docker.internal resolves to the Docker host via extra_hosts
#
# Middleware defined here:
#   authelia@file             - Forward authentication via Authelia
#                               Reference in Docker labels as: authelia@file
#   sablier-<service>@file    - Per-container on-demand wake. One middleware per
#                               service so each Sablier-managed container has an
#                               independent lifecycle (a hit on `actual` must not
#                               wake `snapotter`). Chain AFTER authelia so unauth'd
#                               probes don't wake containers:
#                                 middlewares: "authelia@file,sablier-actual@file"
#                               Each target service also needs sablier.enable=true,
#                               a matching sablier.group=<service> label, and
#                               traefik.docker.allownonrunning=true.
#   sablier-movienight-test@file
#                             - Intentional multi-container group: the frontend
#                               and backend of the movienight-test CI stack wake
#                               together on a browser hit (the app is unusable
#                               without both). Kept in its own group so it doesn't
#                               interact with the per-service tools middlewares.

http:
  middlewares:
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/authz/forward-auth"
        trustForwardHeader: true
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Email"
          - "Remote-Name"

    # Per-service Sablier middlewares. All share the same session/theme/probe
    # settings — only `group` differs. Duplicated (not anchored) to match the
    # existing dynamic.yaml style and to keep each block independently readable.
    # 60m sessionDuration matches the plan: tools where you might walk away
    # between edits. keepAliveInterval keeps long uploads / SSE streams warm.
    # ignoreUserAgent filters uptime probes so they don't wake containers.

    sablier-actual:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          group: "actual"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "Actual Budget"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

    sablier-stirling-pdf:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          group: "stirling-pdf"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "Stirling PDF"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

    sablier-vikunja:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          group: "vikunja"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "Vikunja"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

    sablier-snapotter:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          group: "snapotter"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "SnapOtter"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

    sablier-immich-power-tools:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          group: "immich-power-tools"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "Immich Power Tools"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

    sablier-homescreen-hero:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          group: "homescreen-hero"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "Homescreen Hero"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

    sablier-movienight-test:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          # Isolated group so a hit on the movienight-test host doesn't wake the
          # tools fleet, and vice versa. Frontend + backend share this group so
          # they wake together on a browser hit. The postgres DB is left running
          # to avoid start-order races on wake (docker start doesn't honour
          # depends_on: service_healthy — that's a compose-up-only guarantee).
          group: "movienight-test"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "MovieNight Test"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

  routers:
    plex:
      rule: Host(`plex.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: plex
      # No Authelia — Plex handles its own authentication

    ha:
      rule: Host(`ha.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: ha
      # Home Assistant: no Authelia — mobile app and integrations use Bearer tokens

    ma:
      rule: Host(`ma.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: ma
      middlewares:
        - authelia
      # Music Assistant: protected by Authelia. If HA integration breaks, remove the middleware.

    glances:
      rule: Host(`glances.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: glances
      middlewares:
        - authelia

  services:
    plex:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:32400
        passHostHeader: true

    ha:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8123
        passHostHeader: true
    ma:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8095
        passHostHeader: true
    glances:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:61208
