# Traefik File Provider - Production
# Routes for services using network_mode: host
# These cannot be discovered by Traefik's Docker provider
# host.docker.internal resolves to the Docker host via extra_hosts
#
# Middleware defined here:
#   authelia@file             - Forward authentication via Authelia
#                               Reference in Docker labels as: authelia@file
#   sablier-tools@file        - On-demand container wake for occasional-use tools
#                               (group `tools`). Chain AFTER authelia so unauth'd
#                               probes don't wake containers:
#                                 middlewares: "authelia@file,sablier-tools@file"
#                               Each target service also needs sablier.enable=true,
#                               sablier.group=tools, and traefik.docker.allownonrunning=true.
#   sablier-movienight-test@file
#                             - Same pattern but scoped to the movienight-test CI
#                               stack (group `movienight-test`). Kept separate so a
#                               hit on the test env doesn't wake the tools fleet
#                               (and vice versa).

http:
  middlewares:
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/authz/forward-auth"
        trustForwardHeader: true
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Email"
          - "Remote-Name"

    sablier-tools:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          # Group name — Sablier wakes/stops all containers labelled with this group
          # together. Each Sablier-managed service currently uses its own group
          # (sablier.group=<service-name>); this middleware's `group` is set per
          # target via the sablier.group service label, but the plugin still
          # requires a value here as its group-of-record default.
          group: "tools"
          # 60m matches the plan: photo tools where you might walk away between edits.
          sessionDuration: "60m"
          # Keep the session alive during long uploads / SSE streams.
          keepAliveInterval: "30s"
          # Silently ignore probes so they don't wake containers.
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "Nova Service"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

    sablier-movienight-test:
      plugin:
        sablier:
          sablierUrl: "http://sablier:10000"
          # Isolated group so a hit on the movienight-test host doesn't wake the
          # tools fleet, and vice versa. Frontend + backend share this group so
          # they wake together on a browser hit. The postgres DB is left running
          # to avoid start-order races on wake (docker start doesn't honour
          # depends_on: service_healthy — that's a compose-up-only guarantee).
          group: "movienight-test"
          sessionDuration: "60m"
          keepAliveInterval: "30s"
          ignoreUserAgent:
            - "(?i)uptimerobot"
            - "(?i)uptime-kuma"
            - "curl"
            - "wget"
          dynamic:
            displayName: "MovieNight Test"
            theme: "ghost"
            refreshFrequency: "5s"
            showDetails: true

  routers:
    plex:
      rule: Host(`plex.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: plex
      # No Authelia — Plex handles its own authentication

    ha:
      rule: Host(`ha.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: ha
      # Home Assistant: no Authelia — mobile app and integrations use Bearer tokens

    ma:
      rule: Host(`ma.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: ma
      middlewares:
        - authelia
      # Music Assistant: protected by Authelia. If HA integration breaks, remove the middleware.

    glances:
      rule: Host(`glances.{{ env "NOVA_DOMAIN" }}`)
      entrypoints:
        - websecure
      tls: {}
      service: glances
      middlewares:
        - authelia

  services:
    plex:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:32400
        passHostHeader: true

    ha:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8123
        passHostHeader: true
    ma:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8095
        passHostHeader: true
    glances:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:61208
